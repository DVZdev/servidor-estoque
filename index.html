<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMedia - Davi Moura</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'pt', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        :root { --primary: #ff6600; --success: #10b981; --danger: #ef4444; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover; min-height: 100vh;
            top: 0 !important; /* Impede o Google de empurrar o body */
        }

        /* Ajuste do Tradutor para não quebrar o layout */
        #google_translate_element { 
            position: fixed; 
            top: 15px; 
            left: 15px; 
            z-index: 10002; 
        }
        .goog-te-banner-frame.skiptranslate { display: none !important; } 
        body { top: 0px !important; }

        .hidden { display: none !important; }

        /* LOGIN - Centralização Forçada */
        #tela-login { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover; 
            z-index: 10000; 
        }
        .login-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: none; outline: none; background: white; }

        /* PAINEL */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.98); padding: 15px 25px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .card-principal { background: rgba(255, 255, 255, 0.98); border-radius: 24px; padding: 25px; min-height: 500px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }

        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; text-transform: uppercase; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-ghost { background: #f1f5f9; color: #64748b; }
        .btn-clear { background: #fee2e2; color: var(--danger); }
        
        .item-produto { background: white; border: 1px solid #f1f5f9; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; font-size: 13px; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        
        #carrinho-area { background: #fff7ed; border: 2px dashed var(--primary); padding: 20px; border-radius: 20px; margin-bottom: 25px; }
        .hist-item { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); font-size: 13px; display: flex; justify-content: space-between; align-items: center; }

        #modal-progresso { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; text-align: center; }
        .progresso-container { width: 350px; height: 14px; background: #334155; border-radius: 7px; overflow: hidden; margin: 20px 0; }
        #barra-preenchimento { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 15px var(--primary); transition: width 0.1s linear; }

        .badge-admin { background: #0f172a; color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-left: 10px; }
        .creator-tag { font-size: 10px; color: var(--primary); font-weight: 800; letter-spacing: 1px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="modal-progresso" class="hidden">
        <h2 id="txt-progresso">Processando...</h2>
        <div class="progresso-container"><div id="barra-preenchimento"></div></div>
        <p id="contagem-progresso" style="font-size: 18px;">0 / 0</p>
    </div>

    <div id="tela-login">
        <div class="login-card">
            <h1 style="color:white; margin:0; letter-spacing: 2px;">MYMEDIA</h1>
            <span class="creator-tag">DESENVOLVIDO POR DAVI MOURA</span>
            <input type="text" id="user" placeholder="Usuário" style="margin-top:20px">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-primary" style="width:100%; justify-content:center; margin-bottom: 10px;" onclick="autenticar('login')">ENTRAR</button>
            <button class="btn" style="background:none; color:white; font-size:11px; width:100%" onclick="autenticar('register')">Novo Registro</button>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div class="container">
            <div style="text-align: right; color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 800; margin-bottom: 5px; letter-spacing: 1px;">
                SISTEMA OFICIAL | DAVI MOURA
            </div>
            <div class="header-nav">
                <div style="display:flex; align-items:center;">
                    <div style="font-weight:800; color:var(--primary); font-size:24px;">MYMEDIA</div>
                    <span id="label-admin" class="badge-admin">Carregando...</span>
                </div>
                <div style="display:flex; gap:12px">
                    <button class="btn btn-ghost" onclick="aba('estoque')">📦 ESTOQUE</button>
                    <button class="btn btn-ghost" onclick="aba('hist')">🕒 HISTÓRICO</button>
                    <button class="btn btn-clear" onclick="location.reload()">SAIR</button>
                </div>
            </div>

            <div class="card-principal">
                <div id="aba-estoque">
                    <div id="carrinho-area" class="hidden">
                        <h4 style="margin:0 0 10px 0;">🛒 Carrinho de Saída</h4>
                        <div id="lista-carrinho"></div>
                        <div style="margin-top:15px; display:flex; gap:10px">
                            <button class="btn btn-success" onclick="finalizarPedido()">FINALIZAR E GERAR PDF</button>
                            <button class="btn btn-ghost" onclick="limparCarrinho()">LIMPAR</button>
                        </div>
                    </div>

                    <div style="border-bottom: 2px solid #f1f5f9; padding-bottom: 25px; margin-bottom: 25px;">
                        <div style="display:grid; grid-template-columns: 1fr 2.5fr 1fr 1fr; gap:12px; margin-bottom:15px;">
                            <input type="text" id="p-cod" placeholder="Cód" oninput="buscaAuto(this.value)" style="padding:14px; border-radius:12px; border:1px solid #ddd">
                            <input type="text" id="p-nome" placeholder="Produto" style="padding:14px; border-radius:12px; border:1px solid #ddd">
                            <input type="number" id="p-qtd" placeholder="Armazém" style="padding:14px; border-radius:12px; border:1px solid #ddd">
                            <input type="number" id="p-sis" placeholder="Sist." style="padding:14px; border-radius:12px; border:1px solid #ddd">
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap: wrap;">
                            <button class="btn btn-success" onclick="lancar()">SALVAR</button>
                            <button class="btn btn-primary" onclick="addAoCarrinho()">+ ADD PEDIDO</button>
                            <button class="btn btn-clear" onclick="limparEstoqueTotal()">ZERAR TUDO</button>
                            <label class="btn btn-ghost" style="cursor:pointer">📥 IMPORTAR EXCEL <input type="file" style="display:none" onchange="importarMassa(this)"></label>
                        </div>
                    </div>

                    <input type="text" placeholder="🔍 Pesquisar por código ou nome..." style="width:100%; padding:18px; border-radius:18px; border:1px solid #eee; margin-bottom:20px;" onkeyup="filtrarLista(this.value)">
                    <div id="corpo-estoque-lista"></div>
                </div>

                <div id="aba-hist" class="hidden">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                        <h3 style="margin:0">🕒 Histórico de Movimentações</h3>
                        <small style="color:var(--primary); font-weight:800">Admin: Davi Moura</small>
                    </div>
                    <div id="lista-hist-container"></div>
                </div>
            </div>
            
            <div style="text-align: center; color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 30px; font-weight: 600;">
                MYMEDIA LOGÍSTICA © 2026 | DESENVOLVIDO POR DAVI MOURA
            </div>
        </div>
    </div>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], carrinho = [], userAtivo = null;

        async function autenticar(modo) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API}/auth/${modo}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            if(res.ok) {
                userAtivo = await res.json();
                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                document.getElementById('label-admin').innerText = userAtivo.isadmin ? "Administrador" : "Usuário";
                carregar();
            } else alert("Acesso negado.");
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            let dados = await res.json();
            estoque = dados.sort((a, b) => parseInt(a.cod) - parseInt(b.cod));
            renderLista();
        }

        function renderLista() {
            document.getElementById('corpo-estoque-lista').innerHTML = estoque.map(p => {
                const qS = p.qtd_sistema || 0;
                const dif = (p.qtd || 0) - qS;
                return `
                <div class="item-produto" data-busca="${p.cod} ${p.nome}">
                    <div style="flex:1">
                        <b>${p.nome}</b> <small>(ID: ${p.cod})</small>
                        <div class="grid-info">
                            <div>Armazém: <b>${p.qtd || 0}</b></div>
                            <div>Sistema: <b>${qS}</b></div>
                            <div style="color:${dif < 0 ? 'red' : (dif > 0 ? 'green' : '#64748b')}; font-weight:bold">Dif: ${dif}</div>
                        </div>
                    </div>
                    <div style="display:flex; gap:15px">
                        <button onclick="editarRapido('${p.cod}','${p.nome}',${p.qtd || 0},${qS})" style="border:none; background:none; cursor:pointer; font-size:20px">✏️</button>
                        <button onclick="excluirProduto('${p.cod}')" style="border:none; background:none; cursor:pointer; color:red; font-size:20px">❌</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function importarMassa(input) {
            const r = new FileReader();
            r.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                document.getElementById('modal-progresso').classList.remove('hidden');
                let count = 0;
                for(let i = 1; i < rows.length; i++) {
                    const l = rows[i]; if(!l[0]) continue;
                    let vSisFinal = 0;
                    if(l[3] !== undefined && l[3] !== null) { vSisFinal = parseInt(l[3].toString().replace(/[^\d]/g, '')) || 0; }
                    await fetch(`${API}/estoque`, { 
                        method: 'POST', headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ cod: l[0].toString().trim(), nome: (l[1] || "Sem Nome").toString(), qtd: parseInt(l[2]) || 0, qtd_sistema: vSisFinal }) 
                    });
                    count++;
                    document.getElementById('barra-preenchimento').style.width = (count / (rows.length-1) * 100) + "%";
                }
                document.getElementById('modal-progresso').classList.add('hidden');
                carregar(); alert("Importação Finalizada!");
            };
            r.readAsArrayBuffer(input.files[0]);
        }

        async function limparEstoqueTotal() {
            if(!confirm("⚠️ DESEJA ZERAR TODO O ESTOQUE?")) return;
            document.getElementById('modal-progresso').classList.remove('hidden');
            document.getElementById('txt-progresso').innerText = "Limpando Banco...";
            let total = estoque.length;
            let count = 0;
            for(let p of estoque) { 
                await fetch(`${API}/estoque/${p.cod}`, { method: 'DELETE' }); 
                count++;
                document.getElementById('barra-preenchimento').style.width = (count / total * 100) + "%";
                await new Promise(r => setTimeout(r, 50));
            }
            document.getElementById('modal-progresso').classList.add('hidden');
            carregar();
            alert("Estoque Zerado!");
        }

        async function finalizarPedido() {
            if(!carrinho.length) return;
            document.getElementById('modal-progresso').classList.remove('hidden');
            for(let i of carrinho) {
                const ex = estoque.find(x => x.cod == i.cod);
                const novaQtd = (ex.qtd || 0) - i.qtd;
                await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...ex, qtd: novaQtd}) });
                await fetch(`${API}/historico`, { 
                    method: 'POST', headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ cod: i.cod, nome: i.nome, qtd: i.qtd, tipo_mov: 'SAÍDA (PEDIDO)', usuario: userAtivo.u }) 
                });
            }
            document.getElementById('modal-progresso').classList.add('hidden');
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("MYMEDIA SAÍDA", 15, 20);
            doc.autoTable({ head: [['Código', 'Produto', 'Qtd']], body: carrinho.map(x => [x.cod, x.nome, x.qtd]), startY: 30 });
            doc.save(`Pedido_${Date.now()}.pdf`);
            carrinho = []; renderCarrinho(); carregar();
        }

        async function carregarHist() {
            const res = await fetch(`${API}/historico`);
            let h = await res.json();
            h.sort((a, b) => new Date(b.data) - new Date(a.data));
            document.getElementById('lista-hist-container').innerHTML = h.slice(0, 100).map(x => `
                <div class="hist-item">
                    <div>[${x.cod}] <b>${x.nome}</b> - Qtd: ${x.qtd} (${x.tipo_mov})</div>
                    <div style="font-size:11px; opacity:0.6;">${new Date(x.data).toLocaleString('pt-BR')} - Por: ${x.usuario}</div>
                </div>`).join('');
        }

        async function lancar() {
            const cod = document.getElementById('p-cod').value;
            const nome = document.getElementById('p-nome').value;
            const qtd = parseInt(document.getElementById('p-qtd').value) || 0;
            const sis = parseInt(document.getElementById('p-sis').value) || 0;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd, qtd_sistema: sis}) });
            carregar(); 
        }

        function buscaAuto(c) { 
            const p = estoque.find(x => x.cod == c.trim()); 
            if(p) { document.getElementById('p-nome').value = p.nome; document.getElementById('p-qtd').value = p.qtd; document.getElementById('p-sis').value = p.qtd_sistema || 0; } 
        }
        
        function addAoCarrinho() {
            const cod = document.getElementById('p-cod').value;
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const p = estoque.find(x => x.cod == cod);
            if(!p || isNaN(qtd)) return alert("Erro no produto.");
            carrinho.push({ cod: p.cod, nome: p.nome, qtd: qtd });
            document.getElementById('carrinho-area').classList.remove('hidden');
            renderCarrinho();
        }

        function renderCarrinho() {
            document.getElementById('lista-carrinho').innerHTML = carrinho.map((item, i) => `<div style="padding:5px; background:white; margin-bottom:5px; border-radius:5px">${item.nome} (${item.qtd}) <button onclick="carrinho.splice(${i},1); renderCarrinho();">x</button></div>`).join('');
            if(!carrinho.length) document.getElementById('carrinho-area').classList.add('hidden');
        }

        async function editarRapido(cod, nome, qA, qS) {
            const nA = prompt(`Novo Armazém:`, qA); if(nA === null) return;
            const nS = prompt(`Novo Sistema:`, qS); if(nS === null) return;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd: parseInt(nA), qtd_sistema: parseInt(nS)}) });
            carregar();
        }

        async function excluirProduto(cod) { if(confirm("Excluir item?")) { await fetch(`${API}/estoque/${cod}`, { method: 'DELETE' }); carregar(); } }
        function aba(t) { document.getElementById('aba-estoque').classList.toggle('hidden', t !== 'estoque'); document.getElementById('aba-hist').classList.toggle('hidden', t !== 'hist'); if(t === 'hist') carregarHist(); }
        function filtrarLista(v) { const t = v.toLowerCase(); document.querySelectorAll('.item-produto').forEach(el => el.style.display = el.getAttribute('data-busca').toLowerCase().includes(t) ? "flex" : "none"); }
        function limparCarrinho() { carrinho = []; renderCarrinho(); }
    </script>
</body>
</html>
