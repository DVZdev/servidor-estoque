<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMedia - Sistema de Expedição</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff6600; 
            --primary-hover: #e65c00;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --border: #f1f5f9;
        }

        * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; transition: all 0.2s ease; }
        body { margin: 0; padding: 0; background-color: #0f172a; }
        .hidden { display: none !important; }

        #tela-login {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover; z-index: 10000;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 32px;
            width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-card input { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 14px;
            border: none; background: rgba(255, 255, 255, 0.9); outline: none;
        }

        #painel.ativo {
            min-height: 100vh;
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), 
                        url('https://images.unsplash.com/photo-1553413077-190dd305871c?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover; padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
        .header-nav {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.95); padding: 15px 25px; border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); margin-bottom: 25px;
        }

        .card-principal {
            background: rgba(255, 255, 255, 0.98); border-radius: 24px; padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: 1px solid var(--border);
        }

        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-ghost { background: #f1f5f9; color: var(--text-sub); }
        .btn-clear { background: #fee2e2; color: var(--danger); font-size: 11px; padding: 8px 12px; }
        
        #carrinho-area { background: #fff7ed; border: 2px dashed var(--primary); padding: 20px; border-radius: 20px; margin-bottom: 25px; }
        .item-produto { background: white; border: 1px solid var(--border); padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .alerta { border-left: 5px solid var(--danger); }

        .btn-excluir-item { color: var(--danger); font-weight: 800; cursor: pointer; border: none; background: none; padding: 5px 10px; font-size: 18px; }

        .hist-item { background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 8px; font-size: 13px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-card">
            <h1 style="color:white; margin:0 0 5px 0;">MyMedia</h1>
            <p style="color:white; opacity:0.8; margin-bottom:25px;">Expedição e Logística</p>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="autenticar('login')">Entrar</button>
            <button class="btn" style="background:none; color:white; font-size:12px; margin-top:10px; width:100%" onclick="autenticar('register')">Criar nova conta</button>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div class="container">
            <div class="header-nav">
                <div style="font-weight:800; color:var(--primary)">MYMEDIA</div>
                <div style="display:flex; gap:10px">
                    <button class="btn btn-ghost" onclick="aba('estoque')">Estoque</button>
                    <button id="btn-hist-nav" class="btn btn-ghost hidden" onclick="aba('hist')">Histórico</button>
                    <button class="btn" style="background:#fee2e2; color:var(--danger)" onclick="location.reload()">Sair</button>
                </div>
            </div>

            <div class="card-principal">
                <div id="aba-estoque">
                    <div id="carrinho-area" class="hidden">
                        <h4 style="margin:0 0 10px 0; color:var(--primary)">🛒 Itens do Pedido</h4>
                        <div id="lista-carrinho"></div>
                        <div style="margin-top:15px; display:flex; gap:10px">
                            <button class="btn btn-success" onclick="finalizarPedido()">Finalizar e PDF</button>
                            <button class="btn btn-ghost" onclick="limparCarrinho()">Cancelar</button>
                        </div>
                    </div>

                    <div id="area-admin" class="hidden">
                        <div style="display:grid; grid-template-columns: 1fr 2fr 1fr 1fr; gap:10px; margin-bottom:15px;">
                            <input type="text" id="p-cod" placeholder="Cód" style="padding:12px; border-radius:10px; border:1px solid #ddd" oninput="buscaAuto(this.value)">
                            <input type="text" id="p-nome" placeholder="Produto" style="padding:12px; border-radius:10px; border:1px solid #ddd">
                            <input type="number" id="p-qtd" placeholder="Qtd" style="padding:12px; border-radius:10px; border:1px solid #ddd">
                            <input type="number" id="p-min" placeholder="Mín" style="padding:12px; border-radius:10px; border:1px solid #ddd">
                        </div>
                        <div style="display:flex; gap:10px; margin-bottom:25px; align-items: center;">
                            <button class="btn btn-success" onclick="lancar('ENTRADA')">Entrada</button>
                            <button class="btn btn-primary" onclick="addAoCarrinho()">+ Adicionar ao Pedido</button>
                            <button class="btn btn-clear" onclick="limparCampos()">Limpar Campos</button>
                            <button class="btn btn-clear" style="background:#ef4444; color:white" onclick="limparEstoqueTotal()">Limpar Todo Estoque</button>
                            <label class="btn btn-ghost" style="font-size:12px">📥 Excel <input type="file" style="display:none" onchange="importarMassa(this)"></label>
                        </div>
                    </div>

                    <input type="text" placeholder="🔍 Pesquisar no estoque..." style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:20px;" onkeyup="filtrarLista(this.value)">
                    <div id="corpo-estoque-lista"></div>
                </div>

                <div id="aba-hist" class="hidden">
                    <h3 style="margin-top:0">🕒 Histórico de Movimentações</h3>
                    <div id="lista-hist-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], carrinho = [], userAtivo = null;

        async function autenticar(modo) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Preencha os campos!");
            
            const res = await fetch(`${API}/auth/${modo}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            if(res.ok) {
                if(modo === 'register') return alert("Registrado com sucesso! Agora faça login.");
                userAtivo = await res.json();
                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                document.getElementById('painel').classList.add('ativo');
                if(userAtivo.isadmin) {
                    document.getElementById('area-admin').classList.remove('hidden');
                    document.getElementById('btn-hist-nav').classList.remove('hidden');
                }
                carregar();
            } else alert("Erro na autenticação.");
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            estoque = await res.json();
            renderLista();
        }

        function renderLista() {
            document.getElementById('corpo-estoque-lista').innerHTML = estoque.map(p => `
                <div class="item-produto ${p.qtd <= (p.min || 0) ? 'alerta' : ''}" data-busca="${p.cod} ${p.nome}">
                    <div><b>${p.nome}</b><br><small>COD: ${p.cod}</small></div>
                    <div style="display:flex; align-items:center; gap:15px">
                        <div style="text-align:right"><b>${p.qtd}</b> un<br><small>Mín: ${p.min || 0}</small></div>
                        ${userAtivo && userAtivo.isadmin ? `<button class="btn-excluir-item" onclick="excluirProduto('${p.cod}')">×</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function excluirProduto(cod) {
            if(!confirm("Deseja excluir este produto definitivamente?")) return;
            await fetch(`${API}/estoque/${cod}`, { method: 'DELETE' });
            carregar();
        }

        async function limparEstoqueTotal() {
            if(!confirm("ATENÇÃO: Isso apagará TODOS os produtos do estoque. Confirma?")) return;
            // Deletar um por um (ou endpoint de bulk delete se existir)
            for(let p of estoque) {
                await fetch(`${API}/estoque/${p.cod}`, { method: 'DELETE' });
            }
            carregar();
        }

        function addAoCarrinho() {
            const cod = document.getElementById('p-cod').value;
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const p = estoque.find(x => x.cod == cod);
            if(!p || isNaN(qtd) || qtd > p.qtd) return alert("Erro no estoque ou quantidade!");
            carrinho.push({ cod: p.cod, nome: p.nome, qtd: qtd });
            document.getElementById('carrinho-area').classList.remove('hidden');
            renderCarrinho();
        }

        function renderCarrinho() {
            document.getElementById('lista-carrinho').innerHTML = carrinho.map((item, i) => `
                <div style="display:flex; justify-content:space-between; padding:8px; background:white; border-radius:10px; margin-bottom:5px; font-size:13px;">
                    <span>${item.nome} (x${item.qtd})</span>
                    <button onclick="carrinho.splice(${i},1); renderCarrinho();" style="color:red; border:none; background:none; cursor:pointer;">✖</button>
                </div>
            `).join('');
            if(carrinho.length === 0) document.getElementById('carrinho-area').classList.add('hidden');
        }

        async function finalizarPedido() {
            for(let item of carrinho) {
                const ex = estoque.find(x => x.cod == item.cod);
                await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...ex, qtd: ex.qtd - item.qtd}) });
                await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: item.cod, nome: item.nome, qtd: item.qtd, tipo_mov: 'SAÍDA', usuario: userAtivo.u}) });
            }
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("PEDIDO MYMEDIA", 15, 20);
            doc.autoTable({ head: [['Cód', 'Produto', 'Qtd']], body: carrinho.map(i => [i.cod, i.nome, i.qtd]), startY: 25 });
            doc.save(`pedido_${Date.now()}.pdf`);
            carrinho = []; renderCarrinho(); carregar();
        }

        function limparCarrinho() { carrinho = []; renderCarrinho(); }

        function limparCampos() {
            document.getElementById('p-cod').value = '';
            document.getElementById('p-nome').value = '';
            document.getElementById('p-qtd').value = '';
            document.getElementById('p-min').value = '';
        }

        async function lancar(tipo) {
            const cod = document.getElementById('p-cod').value;
            const nome = document.getElementById('p-nome').value;
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const min = parseInt(document.getElementById('p-min').value) || 0;
            const ex = estoque.find(x => x.cod == cod);
            let total = (ex) ? ex.qtd + qtd : qtd;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd: total, min}) });
            await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd, tipo_mov: tipo, usuario: userAtivo.u}) });
            carregar();
        }

        async function importarMassa(input) {
            const r = new FileReader();
            r.onload = async (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: ["cod", "nome", "qtd", "min"], range: 1});
                for(const f of rows) { if(f.cod) await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: f.cod.toString(), nome: f.nome, qtd: parseInt(f.qtd), min: parseInt(f.min) || 0}) }); }
                carregar(); alert("Importado!");
            };
            r.readAsArrayBuffer(input.files[0]);
        }

        function aba(t) { 
            document.getElementById('aba-estoque').classList.toggle('hidden', t !== 'estoque'); 
            document.getElementById('aba-hist').classList.toggle('hidden', t !== 'hist'); 
            if(t === 'hist') carregarHist(); 
        }

        async function carregarHist() {
            const res = await fetch(`${API}/historico`);
            const h = await res.json();
            document.getElementById('lista-hist-container').innerHTML = h.reverse().map(x => `
                <div class="hist-item">
                    <b>${x.nome}</b> (${x.qtd}) - <b>${x.tipo_mov}</b><br>
                    <small>${new Date(x.data).toLocaleString()} por ${x.usuario}</small>
                </div>
            `).join('');
        }

        function buscaAuto(c) {
            const p = estoque.find(x => x.cod == c.trim());
            if(p) { document.getElementById('p-nome').value = p.nome; document.getElementById('p-min').value = p.min; }
        }

        function filtrarLista(v) {
            const t = v.toLowerCase();
            document.querySelectorAll('.item-produto').forEach(el => el.style.display = el.getAttribute('data-busca').toLowerCase().includes(t) ? "flex" : "none");
        }
    </script>
</body>
</html>
