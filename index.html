<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Expedição v27 - Full</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f1f5f9; --success: #059669; --danger: #be123c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        /* Estilo do Tradutor */
        #google_translate_element { margin-bottom: 10px; text-align: right; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { padding: 12px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; color: white; background: var(--accent); transition: 0.2s; }
        button:hover { opacity: 0.8; }
        
        .nav { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; color: #64748b; font-size: 13px; }
        .alert-min { color: var(--danger); font-weight: bold; background: #fff1f2; }
        
        @media (max-width: 768px) { .layout { grid-template-columns: 1fr !important; } }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="tela-login">
        <div class="card" style="max-width: 380px; margin: 60px auto; border-top: 5px solid var(--accent);">
            <h2 style="text-align:center">Acesso ao Sistema</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="autenticar('login')" style="flex:1">Entrar</button>
                <button onclick="autenticar('register')" style="flex:1; background:var(--success)">Registrar</button>
            </div>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div class="nav">
            <div>📦 <b>Expedição Digital</b> | <span id="nome-exibir"></span></div>
            <div style="display:flex; gap:8px">
                <button onclick="aba('estoque')">Estoque</button>
                <button id="btn-hist-nav" class="hidden" onclick="aba('hist')">Histórico</button>
                <button onclick="location.reload()" style="background:var(--danger)">Sair</button>
            </div>
        </div>

        <div id="aba-estoque" class="card">
            <div id="area-admin" class="hidden" style="margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px;">
                <h3>⚙️ Painel de Controle (Admin)</h3>
                <div style="display: grid; grid-template-columns: 2fr 2fr 1fr 1fr; gap: 10px;">
                    <input type="text" id="p-cod" placeholder="Código" oninput="buscaAuto(this.value)">
                    <input type="text" id="p-nome" placeholder="Produto">
                    <input type="number" id="p-qtd" value="1">
                    <input type="number" id="p-min" value="5">
                </div>
                <div style="margin-top:15px; display:flex; gap:10px; flex-wrap: wrap;">
                    <button onclick="lancar('ENTRADA')" style="background:var(--success)">➕ Entrada Manual</button>
                    <button onclick="addCarrinho()">📝 Add p/ Saída</button>
                    <label style="background:#157347; color:white; padding:12px; border-radius:6px; cursor:pointer; font-weight:bold; display:inline-block;">
                        📥 Importar Excel (cod, nome, qtd, min)
                        <input type="file" accept=".xlsx" style="display:none" onchange="importarMassa(this)">
                    </label>
                </div>
            </div>

            <div id="box-saida" class="hidden" style="background:#fefce8; padding:20px; border-radius:10px; border: 1px solid #fef08a; margin-bottom:20px;">
                <h4>📋 Carrinho de Saída</h4>
                <div id="itens-lista"></div>
                <input type="text" id="destino" placeholder="Destino da Saída">
                <button onclick="finalizarSaida()" style="width:100%; background:var(--danger); margin-top:10px">Finalizar e Gerar PDF</button>
            </div>

            <h3>📊 Estoque Disponível</h3>
            <input type="text" placeholder="Filtrar produtos..." onkeyup="filtrarTabela(this.value)" style="margin-bottom:15px">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Cód</th><th>Produto</th><th>Qtd</th><th>Mín</th><th>Ações</th></tr>
                    </thead>
                    <tbody id="corpo-estoque"></tbody>
                </table>
            </div>
        </div>

        <div id="aba-hist" class="card hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <h3>🕒 Histórico Global</h3>
                <button onclick="exportarExcel()" style="background:#157347">📗 Exportar Excel</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="tab-hist-full">
                    <thead>
                        <tr><th>Data</th><th>Tipo</th><th>Item</th><th>Qtd</th><th>Usuário</th></tr>
                    </thead>
                    <tbody id="corpo-hist"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'pt', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], carrinho = [], userAtivo = null;

        async function autenticar(modo) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Preencha os campos!");
            try {
                const res = await fetch(`${API}/auth/${modo}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({u, p})
                });
                if(res.ok) {
                    if(modo === 'register') return alert("Registrado com sucesso!");
                    userAtivo = await res.json();
                    document.getElementById('tela-login').classList.add('hidden');
                    document.getElementById('painel').classList.remove('hidden');
                    document.getElementById('nome-exibir').innerText = userAtivo.u;
                    if(userAtivo.isadmin) {
                        document.getElementById('area-admin').classList.remove('hidden');
                        document.getElementById('btn-hist-nav').classList.remove('hidden');
                    }
                    carregar();
                } else alert("Erro no login/registro!");
            } catch(e) { alert("Erro de conexão!"); }
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            estoque = await res.json();
            render();
        }

        function render() {
            const corpo = document.getElementById('corpo-estoque');
            corpo.innerHTML = estoque.map(p => `
                <tr class="${p.qtd <= p.min ? 'alert-min' : ''}">
                    <td>${p.cod}</td>
                    <td>${p.nome}</td>
                    <td><b>${p.qtd}</b></td>
                    <td>${p.min}</td>
                    <td>${userAtivo.isadmin ? `<button onclick="apagar('${p.cod}')" style="background:var(--danger); padding:4px 8px; font-size:11px">X</button>` : '-'}</td>
                </tr>
            `).join('');
        }

        async function lancar(tipo, manual) {
            const item = manual || {
                cod: document.getElementById('p-cod').value,
                nome: document.getElementById('p-nome').value,
                qtd: parseInt(document.getElementById('p-qtd').value),
                min: parseInt(document.getElementById('p-min').value) || 5
            };
            const cadastrado = estoque.find(x => x.cod == item.cod);
            let finalQtd = item.qtd;
            if(tipo === 'ENTRADA' && cadastrado) finalQtd += cadastrado.qtd;
            if(tipo === 'SAÍDA' && cadastrado) finalQtd = cadastrado.qtd - item.qtd;

            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...item, qtd: finalQtd}) });
            await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: item.cod, nome: item.nome, qtd: item.qtd, tipo_mov: tipo, usuario: userAtivo.u}) });
            carregar();
        }

        function importarMassa(input) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                for(let f of rows) {
                    if(f.cod && f.nome) {
                        await lancar('ENTRADA', { cod: f.cod.toString(), nome: f.nome, qtd: parseInt(f.qtd) || 0, min: parseInt(f.min) || 5 });
                    }
                }
                alert("Importado com sucesso!");
                carregar();
            };
            reader.readAsArrayBuffer(input.files[0]);
        }

        function addCarrinho() {
            const cod = document.getElementById('p-cod').value;
            const p = estoque.find(x => x.cod == cod);
            const q = parseInt(document.getElementById('p-qtd').value);
            if(!p || p.qtd < q) return alert("Estoque insuficiente!");
            carrinho.push({cod: p.cod, nome: p.nome, qtd: q});
            document.getElementById('box-saida').classList.remove('hidden');
            document.getElementById('itens-lista').innerHTML = carrinho.map(i => `<div>• ${i.qtd}x ${i.nome}</div>`).join('');
        }

        async function finalizarSaida() {
            const d = document.getElementById('destino').value;
            if(!d) return alert("Preencha o destino!");
            for(let it of carrinho) await lancar('SAÍDA', it);
            const doc = new jspdf.jsPDF();
            doc.text("GUIA DE SAÍDA - DESTINO: " + d.toUpperCase(), 10, 10);
            doc.autoTable({ head: [['Item', 'Qtd']], body: carrinho.map(x => [x.nome, x.qtd]) });
            doc.save(`saida_${d}.pdf`);
            carrinho = []; document.getElementById('box-saida').classList.add('hidden');
            alert("Saída processada!");
        }

        function aba(t) {
            document.getElementById('aba-estoque').classList.toggle('hidden', t !== 'estoque');
            document.getElementById('aba-hist').classList.toggle('hidden', t !== 'hist');
            if(t === 'hist') carregarHist();
        }

        async function carregarHist() {
            const res = await fetch(`${API}/historico`);
            const h = await res.json();
            document.getElementById('corpo-hist').innerHTML = h.map(x => `<tr><td>${new Date(x.data).toLocaleString()}</td><td>${x.tipo_mov}</td><td>${x.nome}</td><td>${x.qtd}</td><td>${x.usuario}</td></tr>`).join('');
        }

        async function apagar(c) { if(confirm("Apagar produto?")) { await fetch(`${API}/estoque/${c}`, {method:'DELETE'}); carregar(); } }
        function buscaAuto(c) { const p = estoque.find(x => x.cod == c.trim()); if(p) { document.getElementById('p-nome').value = p.nome; document.getElementById('p-min').value = p.min; } }
        function exportarExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('tab-hist-full')), "historico.xlsx"); }
        function filtrarTabela(v) { 
            const termo = v.toLowerCase();
            const linhas = document.querySelectorAll("#corpo-estoque tr");
            linhas.forEach(l => l.style.display = l.innerText.toLowerCase().includes(termo) ? "" : "none");
        }
    </script>
</body>
</html>
