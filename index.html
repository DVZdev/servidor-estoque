<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMedia - Sistema de Expedição</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --primary: #ff6600; 
            --primary-dark: #e65c00;
            --bg: #ffffff; 
            --text: #1e293b;
            --success: #059669;
            --danger: #be123c;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            color: var(--text);
            min-height: 100vh;
            /* FUNDO PADRÃO (OPÇÃO 3 - LOGIN) */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1579547621453-625d5d6c8e31?q=80&w=1900&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }

        /* CLASSE PARA MUDAR O FUNDO APÓS LOGIN (OPÇÃO 1) */
        body.logado {
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), 
                        url('https://images.unsplash.com/photo-1605379399642-870262d3d051?q=80&w=1900&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }

        .hidden { display: none !important; }

        /* LOGIN CARD */
        #tela-login {
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 40px; border-radius: 28px; width: 90%; max-width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); text-align: center; color: white;
        }
        .login-card input { background: rgba(255, 255, 255, 0.95); border: none; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 15px; box-sizing: border-box; color: #1e293b; }

        /* PAINEL */
        #painel { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 25px; }
        
        button { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; color: white; background: var(--primary); transition: 0.3s; }
        button:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }

        .admin-form { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .admin-form input { padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; box-sizing: border-box; font-family: inherit; background: white; }

        .item-produto { background: white; padding: 20px; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 15px; display: flex; flex-direction: column; }
        .item-produto.alerta { border-left: 6px solid var(--danger); }
        .valor-nome { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
        .dado-linha { font-size: 14px; margin: 4px 0; color: #475569; display: flex; }
        .dado-linha b { color: #94a3b8; font-size: 11px; min-width: 110px; text-transform: uppercase; }

        .nav { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; padding: 20px 25px; border-radius: 18px; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-card">
            <h1 style="margin:0;">MyMedia</h1>
            <p style="margin-bottom: 30px; opacity: 0.8;">Expedição</p>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="autenticar('login')">Acessar</button>
            <button onclick="autenticar('register')" style="background:none; border: 1px solid rgba(255,255,255,0.3); margin-top:10px; font-size:12px;">Registrar</button>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div id="google_translate_element"></div>
        <div class="nav">
            <div>MYMEDIA | <b>ESTOQUE</b></div>
            <div style="display:flex; gap:10px;">
                <button onclick="aba('estoque')" style="background:rgba(255,255,255,0.2);">Estoque</button>
                <button id="btn-hist-nav" class="hidden" onclick="aba('hist')" style="background:rgba(255,255,255,0.2);">Histórico</button>
                <button onclick="location.reload()" style="background:white; color:var(--primary);">Sair</button>
            </div>
        </div>

        <div id="aba-estoque" class="card">
            <div id="carrinho-area" class="hidden" style="background: #fff7ed; border: 2px dashed var(--primary); padding: 20px; border-radius: 15px; margin-bottom: 25px;">
                <h4 style="margin:0 0 10px 0; color:var(--primary)">🛒 Carrinho de Saída</h4>
                <div id="lista-carrinho"></div>
                <div style="margin-top:15px; display:flex; gap:10px">
                    <button onclick="finalizarSaida()">Gerar PDF e Baixar</button>
                    <button onclick="cancelarSaida()" style="background:#64748b">Limpar</button>
                </div>
            </div>

            <div id="area-admin" class="hidden">
                <div class="admin-form">
                    <input type="text" id="p-cod" placeholder="Cód" style="flex: 1; min-width: 80px;" oninput="buscaAuto(this.value)">
                    <input type="text" id="p-nome" placeholder="Nome do Produto" style="flex: 3; min-width: 200px;">
                    <input type="number" id="p-qtd" placeholder="Qtd" style="flex: 1; min-width: 70px;">
                    <input type="number" id="p-min" placeholder="Mín" style="flex: 1; min-width: 70px;">
                </div>
                <div style="display:flex; gap:10px; margin-bottom:25px; align-items: center; flex-wrap:wrap">
                    <button onclick="lancar('ENTRADA')" class="btn-success">+ Entrada</button>
                    <button onclick="addCarrinho()">- Saída</button>
                    <label style="background:#475569; color:white; padding:12px 25px; border-radius:10px; cursor:pointer; font-weight:700; font-size:12px; width: fit-content;">
                        Excel <input type="file" accept=".xlsx" style="display:none" onchange="importarMassa(this)">
                    </label>
                    <button onclick="limparEstoqueTodo()" class="btn-danger">Zerar Tudo</button>
                </div>
            </div>

            <input type="text" placeholder="🔍 Buscar..." onkeyup="filtrarLista(this.value)" style="width:100%; box-sizing:border-box; padding: 12px; border-radius: 10px; border: 2px solid #f1f5f9; margin-bottom:20px; background:white;">
            <div id="corpo-estoque-lista"></div>
        </div>

        <div id="aba-hist" class="card hidden">
            <h3>🕒 Histórico</h3>
            <div id="lista-hist-container"></div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'pt'}, 'google_translate_element'); }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], carrinho = [], userAtivo = null;

        async function autenticar(modo) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API}/auth/${modo}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            if(res.ok) {
                if(modo === 'register') alert("Registrado!");
                else {
                    userAtivo = await res.json();
                    document.body.classList.add('logado'); // MUDA O FUNDO
                    document.getElementById('tela-login').classList.add('hidden');
                    document.getElementById('painel').classList.remove('hidden');
                    if(userAtivo.isadmin) { document.getElementById('area-admin').classList.remove('hidden'); document.getElementById('btn-hist-nav').classList.remove('hidden'); }
                    carregar();
                }
            } else alert("Erro!");
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            estoque = await res.json();
            renderLista();
        }

        function renderLista() {
            document.getElementById('corpo-estoque-lista').innerHTML = estoque.map(p => `
                <div class="item-produto ${p.qtd <= p.min ? 'alerta' : ''}" data-busca="${p.cod} ${p.nome}">
                    <div class="valor-nome">${p.nome}</div>
                    <div class="dado-linha"><b>Código:</b> ${p.cod}</div>
                    <div class="dado-linha"><b>Estoque:</b> <span style="font-weight:800; color:var(--success)">${p.qtd}</span></div>
                    <div class="dado-linha"><b>Aviso Mínimo:</b> ${p.min || 0}</div>
                    ${userAtivo.isadmin ? `<button onclick="apagar('${p.cod}')" style="background:none; color:var(--danger); padding:0; width:fit-content; font-size:11px; margin-top:10px">Excluir</button>` : ''}
                </div>
            `).join('');
        }

        function addCarrinho() {
            const cod = document.getElementById('p-cod').value.trim();
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const p = estoque.find(x => x.cod == cod);
            if(!p || qtd > p.qtd) return alert("Erro!");
            carrinho.push({ cod: p.cod, nome: p.nome, qtd: qtd });
            renderCarrinho();
            document.getElementById('carrinho-area').classList.remove('hidden');
        }

        function renderCarrinho() {
            document.getElementById('lista-carrinho').innerHTML = carrinho.map((item, i) => `
                <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #ddd;">
                    <span>${item.nome} (x${item.qtd})</span>
                    <button onclick="carrinho.splice(${i},1); renderCarrinho();" style="background:none; color:red; width:auto; padding:0;">✖</button>
                </div>
            `).join('');
        }

        async function finalizarSaida() {
            for(let item of carrinho) {
                const ex = estoque.find(x => x.cod == item.cod);
                await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...ex, qtd: ex.qtd - item.qtd}) });
                await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: item.cod, nome: item.nome, qtd: item.qtd, tipo_mov: 'SAÍDA', usuario: userAtivo.u}) });
            }
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("PEDIDO MYMEDIA", 15, 20);
            doc.autoTable({ head: [['Cód', 'Produto', 'Qtd']], body: carrinho.map(i => [i.cod, i.nome, i.qtd]) });
            doc.save('pedido.pdf');
            carrinho = []; document.getElementById('carrinho-area').classList.add('hidden'); carregar();
        }

        function cancelarSaida() { carrinho = []; document.getElementById('carrinho-area').classList.add('hidden'); }

        async function lancar(tipo) {
            const cod = document.getElementById('p-cod').value.trim();
            const nome = document.getElementById('p-nome').value.trim();
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const min = parseInt(document.getElementById('p-min').value) || 0;
            const ex = estoque.find(x => x.cod == cod);
            let finalQtd = (tipo === 'ENTRADA' && ex) ? ex.qtd + qtd : qtd;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd: finalQtd, min}) });
            await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd, tipo_mov: tipo, usuario: userAtivo.u}) });
            carregar();
        }

        async function importarMassa(input) {
            const r = new FileReader();
            r.onload = async (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: ["cod", "nome", "qtd", "min"], range: 1});
                for(const f of rows) { if(f.cod) await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: f.cod.toString(), nome: f.nome, qtd: parseInt(f.qtd), min: parseInt(f.min) || 0}) }); }
                carregar();
            };
            r.readAsArrayBuffer(input.files[0]);
        }

        function aba(t) { document.getElementById('aba-estoque').classList.toggle('hidden', t !== 'estoque'); document.getElementById('aba-hist').classList.toggle('hidden', t !== 'hist'); if(t === 'hist') carregarHist(); }

        async function carregarHist() {
            const res = await fetch(`${API}/historico`);
            const h = await res.json();
            document.getElementById('lista-hist-container').innerHTML = h.reverse().map(x => `
                <div style="background:rgba(248, 250, 252, 0.9); padding:15px; border-bottom:1px solid #eee; margin-bottom:10px; border-radius:12px;">
                    <b style="color:var(--primary); font-size:18px">${x.nome}</b> [${x.cod}]<br>
                    <small>${new Date(x.data).toLocaleString()} - <b>${x.tipo_mov}</b> (${x.qtd})</small>
                </div>
            `).join('');
        }

        async function apagar(c) { if(confirm("Apagar?")) { await fetch(`${API}/estoque/${c}`, {method:'DELETE'}); carregar(); } }
        async function limparEstoqueTodo() { if(confirm("Limpar TUDO?")) { for(let p of estoque) await fetch(`${API}/estoque/${p.cod}`, {method:'DELETE'}); carregar(); } }

        function buscaAuto(c) { const p = estoque.find(x => x.cod == c.trim()); if(p) { document.getElementById('p-nome').value = p.nome; document.getElementById('p-min').value = p.min; } }
        function filtrarLista(v) {
            const termo = v.toLowerCase();
            document.querySelectorAll('.item-produto').forEach(el => el.style.display = el.getAttribute('data-busca').toLowerCase().includes(termo) ? "flex" : "none");
        }
    </script>
</body>
</html>
