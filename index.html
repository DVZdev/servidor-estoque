<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMedia - Sistema de Expedição</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff6600; 
            --primary-hover: #e65c00;
            --bg-light: #ffffff; 
            --text-main: #0f172a;
            --text-sub: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --border: #f1f5f9;
        }

        * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; transition: all 0.2s ease; }
        body { margin: 0; padding: 0; background-color: #f8fafc; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* TELA DE LOGIN */
        #tela-login {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover; z-index: 10000;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 50px 40px; border-radius: 32px;
            width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-card input { 
            width: 100%; padding: 16px; margin-bottom: 16px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255, 255, 255, 0.9);
            font-size: 16px; outline: none;
        }

        /* PAINEL INTERNO */
        #painel.ativo {
            min-height: 100vh;
            background: linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)), 
                        url('https://images.unsplash.com/photo-1605379399642-870262d3d051?q=80&w=1900&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover; padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }
        .header-nav {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 15px 30px; border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 30px;
        }

        .card-estoque {
            background: white; border-radius: 28px; padding: 30px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border: 1px solid var(--border);
        }

        /* CARRINHO DE PEDIDO */
        #carrinho-area {
            background: #fff7ed; border: 2px dashed var(--primary);
            padding: 20px; border-radius: 20px; margin-bottom: 25px;
        }

        .btn-acao { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: #fee2e2; color: var(--danger); }

        .item-produto {
            background: white; border: 1px solid var(--border); padding: 18px;
            border-radius: 20px; margin-bottom: 12px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .alerta-estoque { border-left: 6px solid var(--danger) !important; }
        
        .form-add { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-add input { padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #f8fafc; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-card">
            <h1 style="color:white; margin:0;">MyMedia</h1>
            <p style="color:white; opacity:0.8;">Gestão de Pedidos & Expedição</p>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-acao btn-primary" style="width:100%" onclick="autenticar()">Entrar</button>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div class="container">
            <div class="header-nav">
                <div style="font-weight:800; color:var(--primary)">MYMEDIA | SISTEMA</div>
                <button class="btn-acao btn-danger" onclick="location.reload()">Sair</button>
            </div>

            <div class="card-estoque">
                <div id="carrinho-area" class="hidden">
                    <h3 style="margin:0 0 15px 0; color:var(--primary)">🛒 Pedido Atual</h3>
                    <div id="lista-carrinho"></div>
                    <div style="margin-top:20px; display:flex; gap:10px">
                        <button class="btn-acao btn-success" onclick="finalizarPedido()">Finalizar e Gerar PDF</button>
                        <button class="btn-acao" style="background:#64748b; color:white;" onclick="limparCarrinho()">Cancelar</button>
                    </div>
                </div>

                <div id="area-admin" class="hidden">
                    <div class="form-add">
                        <input type="text" id="p-cod" placeholder="Cód" style="width:80px" oninput="buscaAuto(this.value)">
                        <input type="text" id="p-nome" placeholder="Nome do Produto" style="flex:1">
                        <input type="number" id="p-qtd" placeholder="Qtd" style="width:80px">
                        <input type="number" id="p-min" placeholder="Mín" style="width:80px">
                        <button class="btn-acao btn-success" onclick="lancar('ENTRADA')">Entrada</button>
                        <button class="btn-acao btn-primary" onclick="addAoCarrinho()">+ Adicionar ao Pedido</button>
                    </div>
                    <div style="margin-bottom:20px; display:flex; gap:10px;">
                        <label style="background:#f1f5f9; padding:10px; border-radius:10px; cursor:pointer; font-size:12px; font-weight:700;">
                            📥 Importar Excel <input type="file" style="display:none" onchange="importarMassa(this)">
                        </label>
                    </div>
                </div>

                <input type="text" placeholder="🔍 Buscar produto..." class="form-add" style="width:100%; padding:15px; border-radius:15px;" onkeyup="filtrarLista(this.value)">
                <div id="corpo-estoque-lista"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], carrinho = [], userAtivo = null;

        async function autenticar() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API}/auth/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            if(res.ok) {
                userAtivo = await res.json();
                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                document.getElementById('painel').classList.add('ativo');
                if(userAtivo.isadmin) document.getElementById('area-admin').classList.remove('hidden');
                carregar();
            } else alert("Acesso Negado");
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            estoque = await res.json();
            renderLista();
        }

        function renderLista() {
            document.getElementById('corpo-estoque-lista').innerHTML = estoque.map(p => `
                <div class="item-produto ${p.qtd <= (p.min || 0) ? 'alerta-estoque' : ''}" data-busca="${p.cod} ${p.nome}">
                    <div><b>${p.nome}</b><br><small>COD: ${p.cod}</small></div>
                    <div style="text-align:right"><span style="color:var(--primary); font-weight:800">${p.qtd}</span> un</div>
                </div>
            `).join('');
        }

        // --- LÓGICA DO PEDIDO (CARRINHO) ---
        function addAoCarrinho() {
            const cod = document.getElementById('p-cod').value;
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const p = estoque.find(x => x.cod == cod);
            
            if(!p || isNaN(qtd) || qtd > p.qtd) return alert("Estoque insuficiente ou produto não encontrado!");
            
            carrinho.push({ cod: p.cod, nome: p.nome, qtd: qtd });
            document.getElementById('carrinho-area').classList.remove('hidden');
            renderCarrinho();
        }

        function renderCarrinho() {
            document.getElementById('lista-carrinho').innerHTML = carrinho.map((item, i) => `
                <div style="display:flex; justify-content:space-between; padding:10px; background:white; border-radius:10px; margin-bottom:5px;">
                    <span>${item.nome} (x${item.qtd})</span>
                    <button onclick="carrinho.splice(${i},1); renderCarrinho();" style="color:red; border:none; background:none; cursor:pointer;">✖</button>
                </div>
            `).join('');
            if(carrinho.length === 0) document.getElementById('carrinho-area').classList.add('hidden');
        }

        async function finalizarPedido() {
            for(let item of carrinho) {
                const ex = estoque.find(x => x.cod == item.cod);
                await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...ex, qtd: ex.qtd - item.qtd}) });
                await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: item.cod, nome: item.nome, qtd: item.qtd, tipo_mov: 'SAÍDA', usuario: userAtivo.u}) });
            }
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("MYMEDIA - PEDIDO DE EXPEDIÇÃO", 15, 20);
            doc.setFontSize(10); doc.text(`Data: ${new Date().toLocaleString()}`, 15, 30);
            doc.autoTable({ head: [['Cód', 'Produto', 'Qtd']], body: carrinho.map(i => [i.cod, i.nome, i.qtd]), startY: 35 });
            doc.save(`pedido_${Date.now()}.pdf`);
            
            carrinho = []; renderCarrinho(); carregar();
            alert("Pedido finalizado e estoque atualizado!");
        }

        function limparCarrinho() { carrinho = []; renderCarrinho(); }

        // --- OUTRAS FUNÇÕES ---
        async function lancar(tipo) {
            const cod = document.getElementById('p-cod').value;
            const nome = document.getElementById('p-nome').value;
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const min = parseInt(document.getElementById('p-min').value) || 0;
            const ex = estoque.find(x => x.cod == cod);
            let total = (ex) ? ex.qtd + qtd : qtd;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd: total, min}) });
            carregar();
        }

        function buscaAuto(c) {
            const p = estoque.find(x => x.cod == c.trim());
            if(p) { document.getElementById('p-nome').value = p.nome; document.getElementById('p-min').value = p.min; }
        }

        function filtrarLista(v) {
            const t = v.toLowerCase();
            document.querySelectorAll('.item-produto').forEach(el => el.style.display = el.getAttribute('data-busca').toLowerCase().includes(t) ? "flex" : "none");
        }
    </script>
</body>
</html>
