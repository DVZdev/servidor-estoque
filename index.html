<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Expedição v42</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f1f5f9; --success: #059669; --danger: #be123c; --warning: #d97706; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        #google_translate_element { margin-bottom: 15px; text-align: right; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Painel de Lançamento */
        .painel-horizontal { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
        .campo-box { display: flex; flex-direction: column; gap: 5px; }
        .campo-box label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        button { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; color: white; background: var(--accent); }

        /* Layout do Inventário (Cartões Individuais) */
        #corpo-estoque-lista { display: flex; flex-direction: column; gap: 15px; }
        .item-produto { background: white; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 5px; }
        .item-produto.alerta { border-left: 6px solid var(--danger); }
        .valor-nome { font-size: 18px; font-weight: 800; color: var(--primary); }
        .dado-linha { font-size: 14px; color: #334155; }
        .dado-linha b { min-width: 90px; display: inline-block; color: #64748b; font-size: 11px; }

        /* Carrinho de Saída */
        #carrinho-area { background: #fffbeb; border: 2px dashed var(--warning); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .item-carrinho { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #fde68a; }

        .nav { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="tela-login">
        <div class="card" style="max-width: 380px; margin: 60px auto;">
            <h2 style="text-align:center">Acesso</h2>
            <input type="text" id="user" placeholder="Usuário" style="width:100%; margin-bottom:10px">
            <input type="password" id="pass" placeholder="Senha" style="width:100%; margin-bottom:20px">
            <button onclick="autenticar('login')" style="width:100%; margin-bottom:10px">Entrar</button>
            <button onclick="autenticar('register')" style="width:100%; background:var(--success)">Registrar Novo</button>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div class="nav">
            <div>📦 <b>Expedição</b> | <span id="nome-exibir"></span></div>
            <div style="display:flex; gap:8px">
                <button onclick="aba('estoque')" style="font-size:12px">Estoque</button>
                <button id="btn-hist-nav" class="hidden" onclick="aba('hist')" style="font-size:12px">Histórico</button>
                <button onclick="location.reload()" style="background:var(--danger); font-size:12px">Sair</button>
            </div>
        </div>

        <div id="aba-estoque" class="card">
            <div id="carrinho-area" class="hidden">
                <h4 style="margin:0 0 10px 0; color:var(--warning)">🛒 Itens para Saída</h4>
                <div id="lista-carrinho"></div>
                <div style="margin-top:15px; display:flex; gap:10px">
                    <button onclick="finalizarSaida()" style="background:var(--warning)">Finalizar e Gerar PDF</button>
                    <button onclick="cancelarSaida()" style="background:#64748b">Cancelar</button>
                </div>
            </div>

            <div id="area-admin" class="hidden">
                <h4 style="margin-top:0">⚙️ Lançamento</h4>
                <div class="painel-horizontal">
                    <div class="campo-box"><label>Código</label><input type="text" id="p-cod" oninput="buscaAuto(this.value)"></div>
                    <div class="campo-box"><label>Nome</label><input type="text" id="p-nome" style="width:250px"></div>
                    <div class="campo-box"><label>Qtd</label><input type="number" id="p-qtd" value="1"></div>
                    <div class="campo-box"><label>Mín</label><input type="number" id="p-min" value="5"></div>
                </div>
                <div style="display:flex; gap:10px; flex-wrap: wrap; margin-bottom: 25px;">
                    <button onclick="lancar('ENTRADA')" style="background:var(--success)">+ Entrada</button>
                    <button onclick="addCarrinho()" style="background:var(--accent)">- Preparar Saída</button>
                    <label style="background:#157347; color:white; padding:10px; border-radius:6px; cursor:pointer; font-weight:700; font-size:13px">
                        📥 Importar Excel
                        <input type="file" accept=".xlsx" style="display:none" onchange="importarMassa(this)">
                    </label>
                    <button onclick="limparEstoqueTodo()" style="background:var(--danger)">Limpar Tudo</button>
                </div>
            </div>

            <h3>📊 Inventário Geral</h3>
            <input type="text" placeholder="Filtrar por nome ou código..." onkeyup="filtrarLista(this.value)" style="width:100%; margin-bottom:20px">
            <div id="corpo-estoque-lista"></div>
        </div>

        <div id="aba-hist" class="card hidden">
            <h3>🕒 Histórico</h3>
            <div id="corpo-hist"></div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'pt', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], carrinho = [], userAtivo = null;

        async function autenticar(modo) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API}/auth/${modo}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            if(res.ok) {
                userAtivo = await res.json();
                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                document.getElementById('nome-exibir').innerText = userAtivo.u;
                if(userAtivo.isadmin) { document.getElementById('area-admin').classList.remove('hidden'); document.getElementById('btn-hist-nav').classList.remove('hidden'); }
                carregar();
            } else alert("Erro no Login");
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            estoque = await res.json();
            renderLista();
        }

        function renderLista() {
            const container = document.getElementById('corpo-estoque-lista');
            container.innerHTML = estoque.map(p => `
                <div class="item-produto ${p.qtd <= p.min ? 'alerta' : ''}" data-busca="${p.cod} ${p.nome}">
                    <div class="valor-nome">${p.nome}</div>
                    <div class="dado-linha"><b>CÓDIGO:</b> ${p.cod}</div>
                    <div class="dado-linha"><b>QTD ATUAL:</b> <span style="font-weight:bold; color:var(--success)">${p.qtd}</span></div>
                    <div class="dado-linha"><b>MÍNIMO:</b> ${p.min}</div>
                    ${userAtivo.isadmin ? `<button onclick="apagar('${p.cod}')" style="background:var(--danger); font-size:10px; width:fit-content; margin-top:5px">Remover</button>` : ''}
                </div>
            `).join('');
        }

        // --- FUNÇÃO PREPARAR SAÍDA (CARRINHO) ---
        function addCarrinho() {
            const cod = document.getElementById('p-cod').value.trim();
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const p = estoque.find(x => x.cod == cod);

            if(!p) return alert("Produto não encontrado!");
            if(qtd > p.qtd) return alert("Estoque insuficiente!");

            carrinho.push({ cod: p.cod, nome: p.nome, qtd: qtd });
            renderCarrinho();
            document.getElementById('carrinho-area').classList.remove('hidden');
        }

        function renderCarrinho() {
            const lista = document.getElementById('lista-carrinho');
            lista.innerHTML = carrinho.map((item, index) => `
                <div class="item-carrinho">
                    <span>${item.nome} (x${item.qtd})</span>
                    <button onclick="removerDoCarrinho(${index})" style="background:none; color:red; padding:0">✖</button>
                </div>
            `).join('');
        }

        function removerDoCarrinho(i) {
            carrinho.splice(i, 1);
            if(carrinho.length === 0) document.getElementById('carrinho-area').classList.add('hidden');
            renderCarrinho();
        }

        async function finalizarSaida() {
            if(!confirm("Confirmar a saída desses itens?")) return;
            
            for(let item of carrinho) {
                const ex = estoque.find(x => x.cod == item.cod);
                const novaQtd = ex.qtd - item.qtd;
                
                await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...ex, qtd: novaQtd}) });
                await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: item.cod, nome: item.nome, qtd: item.qtd, tipo_mov: 'SAÍDA', usuario: userAtivo.u}) });
            }

            gerarPDFSaida();
            carrinho = [];
            document.getElementById('carrinho-area').classList.add('hidden');
            carregar();
            alert("Saída processada com sucesso!");
        }

        function gerarPDFSaida() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("PEDIDO DE SAÍDA - EXPEDIÇÃO", 10, 10);
            doc.text(`Data: ${new Date().toLocaleString()}`, 10, 20);
            doc.autoTable({
                startY: 30,
                head: [['Código', 'Produto', 'Qtd']],
                body: carrinho.map(i => [i.cod, i.nome, i.qtd])
            });
            doc.save(`pedido_${Date.now()}.pdf`);
        }

        function cancelarSaida() { carrinho = []; document.getElementById('carrinho-area').classList.add('hidden'); }

        // --- OUTRAS FUNÇÕES ---
        async function lancar(tipo) {
            const cod = document.getElementById('p-cod').value.trim();
            const nome = document.getElementById('p-nome').value.trim();
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const min = parseInt(document.getElementById('p-min').value) || 5;

            if(!cod || !nome) return;
            const ex = estoque.find(x => x.cod == cod);
            let finalQtd = (tipo === 'ENTRADA' && ex) ? ex.qtd + qtd : qtd;

            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd: finalQtd, min}) });
            await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd, tipo_mov: tipo, usuario: userAtivo.u}) });
            carregar();
        }

        async function importarMassa(input) {
            const r = new FileReader();
            r.onload = async (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: ["cod", "nome", "qtd", "min"], range: 1});
                for(const f of rows) {
                    if(f.cod && f.nome) {
                        await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: f.cod.toString(), nome: f.nome, qtd: parseInt(f.qtd), min: parseInt(f.min) || 5}) });
                    }
                }
                carregar();
                alert("Excel Importado!");
            };
            r.readAsArrayBuffer(input.files[0]);
        }

        function aba(t) {
            document.getElementById('aba-estoque').classList.toggle('hidden', t !== 'estoque');
            document.getElementById('aba-hist').classList.toggle('hidden', t !== 'hist');
            if(t === 'hist') carregarHist();
        }

        async function carregarHist() {
            const res = await fetch(`${API}/historico`);
            const h = await res.json();
            document.getElementById('corpo-hist').innerHTML = h.map(x => `<div style="font-size:12px; border-bottom:1px solid #eee; padding:5px">${new Date(x.data).toLocaleString()} - ${x.tipo_mov}: ${x.nome} (${x.qtd})</div>`).join('');
        }

        async function apagar(c) { if(confirm("Apagar?")) { await fetch(`${API}/estoque/${c}`, {method:'DELETE'}); carregar(); } }
        async function limparEstoqueTodo() { if(confirm("Apagar TUDO?")) { for(let p of estoque) await fetch(`${API}/estoque/${p.cod}`, {method:'DELETE'}); carregar(); } }
        function buscaAuto(c) { const p = estoque.find(x => x.cod == c.trim()); if(p) { document.getElementById('p-nome').value = p.nome; document.getElementById('p-min').value = p.min; } }
        function filtrarLista(v) {
            const termo = v.toLowerCase();
            document.querySelectorAll('.item-produto').forEach(el => el.style.display = el.getAttribute('data-busca').toLowerCase().includes(termo) ? "flex" : "none");
        }
    </script>
</body>
</html>
