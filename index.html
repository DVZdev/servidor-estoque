<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMedia - Sistema de Expedição</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* CORES MYMEDIA: BRANCO E LARANJA */
        :root { 
            --primary: #ff6600; /* Laranja MyMedia */
            --primary-dark: #e65c00;
            --bg: #ffffff; 
            --card-bg: #fdfdfd;
            --text: #1e293b;
            --success: #059669;
            --danger: #be123c;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        #google_translate_element { margin-bottom: 15px; text-align: right; }
        
        /* Estilo dos Cards */
        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px; 
        }

        /* Inputs Modernos */
        .campo-box label { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        input { 
            padding: 12px; 
            border: 2px solid #f1f5f9; 
            border-radius: 8px; 
            font-size: 14px; 
            background: #f8fafc;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: white; }

        /* Botões Estilizados */
        button { 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            color: white; 
            background: var(--primary); 
            box-shadow: 0 4px 6px -1px rgba(255, 102, 0, 0.2);
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-success { background: var(--success); box-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.2); }
        .btn-danger { background: var(--danger); }

        /* Layout Carrinho/Saída */
        #carrinho-area { background: #fff7ed; border: 2px solid #ffedd5; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .item-carrinho { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #fed7aa; }

        /* Layout Inventário MyMedia */
        #corpo-estoque-lista { display: flex; flex-direction: column; gap: 12px; }
        .item-produto { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column; 
            gap: 6px;
            transition: border-color 0.3s;
        }
        .item-produto:hover { border-color: var(--primary); }
        .item-produto.alerta { border-left: 6px solid var(--danger); }
        .valor-nome { font-size: 18px; font-weight: 800; color: var(--text); }
        .dado-linha b { min-width: 100px; color: #94a3b8; font-size: 11px; text-transform: uppercase; }
        .valor-qtd { font-weight: 800; color: var(--primary); font-size: 16px; }

        /* Navbar */
        .nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--primary); 
            color: white; 
            padding: 18px 25px; 
            border-radius: 14px; 
            margin-bottom: 25px;
            box-shadow: 0 4px 12px rgba(255, 102, 0, 0.3);
        }
        .nav b { font-size: 20px; letter-spacing: -0.5px; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="tela-login">
        <div class="card" style="max-width: 400px; margin: 80px auto; text-align: center;">
            <h1 style="color: var(--primary); margin-bottom: 5px;">MyMedia</h1>
            <p style="color: #64748b; margin-bottom: 30px;">Gestão de Inventário</p>
            <div class="campo-box" style="text-align: left; margin-bottom: 15px;"><label>Usuário</label><input type="text" id="user" style="width:100%"></div>
            <div class="campo-box" style="text-align: left; margin-bottom: 25px;"><label>Senha</label><input type="password" id="pass" style="width:100%"></div>
            <button onclick="autenticar('login')" style="width:100%; margin-bottom:12px">Acessar Sistema</button>
            <button onclick="autenticar('register')" style="width:100%; background: #f8fafc; color: var(--primary); border: 1px solid var(--primary);">Novo Cadastro</button>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div class="nav">
            <div>MYMEDIA | <b>EXPEDIÇÃO</b></div>
            <div style="display:flex; gap:10px; align-items: center;">
                <span id="nome-exibir" style="font-size: 12px; opacity: 0.9;"></span>
                <button onclick="aba('estoque')" style="background:rgba(255,255,255,0.2); font-size:12px; box-shadow:none;">Estoque</button>
                <button id="btn-hist-nav" class="hidden" onclick="aba('hist')" style="background:rgba(255,255,255,0.2); font-size:12px; box-shadow:none;">Histórico</button>
                <button onclick="location.reload()" style="background:white; color:var(--primary); font-size:12px; box-shadow:none;">Sair</button>
            </div>
        </div>

        <div id="aba-estoque" class="card">
            <div id="carrinho-area" class="hidden">
                <h4 style="margin:0 0 15px 0; color:var(--primary)">🛒 Itens Preparados para Saída</h4>
                <div id="lista-carrinho"></div>
                <div style="margin-top:20px; display:flex; gap:12px">
                    <button onclick="finalizarSaida()" style="background:var(--primary)">Finalizar Pedido (PDF)</button>
                    <button onclick="cancelarSaida()" style="background:#cbd5e1; color:#475569">Limpar Tudo</button>
                </div>
            </div>

            <div id="area-admin" class="hidden">
                <h4 style="margin-top:0; color: #64748b; font-size: 14px; text-transform: uppercase;">Lançamento e Controle</h4>
                <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; align-items: flex-end;">
                    <div class="campo-box" style="width:130px"><label>Código</label><input type="text" id="p-cod" oninput="buscaAuto(this.value)"></div>
                    <div class="campo-box" style="flex:1; min-width: 200px;"><label>Nome do Produto</label><input type="text" id="p-nome"></div>
                    <div class="campo-box" style="width:80px"><label>Qtd</label><input type="number" id="p-qtd" value="1"></div>
                    <div class="campo-box" style="width:80px"><label>Mín</label><input type="number" id="p-min" value="5"></div>
                </div>
                <div style="display:flex; gap:12px; flex-wrap: wrap; margin-bottom: 30px;">
                    <button onclick="lancar('ENTRADA')" class="btn-success">+ Entrada no Estoque</button>
                    <button onclick="addCarrinho()">- Preparar Saída</button>
                    <label style="background:#475569; color:white; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:700; font-size:13px">
                        📥 Importar Excel
                        <input type="file" accept=".xlsx" style="display:none" onchange="importarMassa(this)">
                    </label>
                    <button onclick="limparEstoqueTodo()" class="btn-danger">Zerar Tudo</button>
                </div>
            </div>

            <h3 style="color: var(--text); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">Inventário de Produtos</h3>
            <input type="text" placeholder="🔍 Buscar por código ou nome..." onkeyup="filtrarLista(this.value)" style="width:100%; margin-bottom:25px; background: white; border: 1px solid #e2e8f0;">
            <div id="corpo-estoque-lista"></div>
        </div>

        <div id="aba-hist" class="card hidden">
            <h3>🕒 Registro de Atividades</h3>
            <div id="lista-hist-container" style="display:flex; flex-direction:column; gap:10px"></div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'pt', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], carrinho = [], userAtivo = null;

        async function autenticar(modo) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API}/auth/${modo}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            if(res.ok) {
                if(modo === 'register') alert("Usuário MyMedia registrado com sucesso!");
                else {
                    userAtivo = await res.json();
                    document.getElementById('tela-login').classList.add('hidden');
                    document.getElementById('painel').classList.remove('hidden');
                    document.getElementById('nome-exibir').innerText = userAtivo.u.toUpperCase();
                    if(userAtivo.isadmin) { document.getElementById('area-admin').classList.remove('hidden'); document.getElementById('btn-hist-nav').classList.remove('hidden'); }
                    carregar();
                }
            } else alert("Erro na autenticação.");
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            estoque = await res.json();
            renderLista();
        }

        function renderLista() {
            const container = document.getElementById('corpo-estoque-lista');
            container.innerHTML = estoque.map(p => `
                <div class="item-produto ${p.qtd <= p.min ? 'alerta' : ''}" data-busca="${p.cod} ${p.nome}">
                    <div class="valor-nome">${p.nome}</div>
                    <div class="dado-linha"><b>Código:</b> ${p.cod}</div>
                    <div class="dado-linha"><b>Qtd Atual:</b> <span class="valor-qtd">${p.qtd}</span></div>
                    <div class="dado-linha"><b>Mínimo:</b> ${p.min}</div>
                    ${userAtivo.isadmin ? `<button onclick="apagar('${p.cod}')" style="background:none; color:var(--danger); font-size:11px; width:fit-content; padding:0; box-shadow:none; margin-top:10px">× Remover do Sistema</button>` : ''}
                </div>
            `).join('');
        }

        function addCarrinho() {
            const cod = document.getElementById('p-cod').value.trim();
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const p = estoque.find(x => x.cod == cod);
            if(!p || qtd > p.qtd) return alert("Erro no estoque!");
            carrinho.push({ cod: p.cod, nome: p.nome, qtd: qtd });
            renderCarrinho();
            document.getElementById('carrinho-area').classList.remove('hidden');
        }

        function renderCarrinho() {
            const lista = document.getElementById('lista-carrinho');
            lista.innerHTML = carrinho.map((item, index) => `
                <div class="item-carrinho"><span>${item.nome} (x${item.qtd})</span><button onclick="removerDoCarrinho(${index})" style="background:none; color:var(--danger); padding:0; box-shadow:none">Remover</button></div>
            `).join('');
        }

        function removerDoCarrinho(i) { carrinho.splice(i, 1); if(carrinho.length === 0) document.getElementById('carrinho-area').classList.add('hidden'); renderCarrinho(); }

        async function finalizarSaida() {
            for(let item of carrinho) {
                const ex = estoque.find(x => x.cod == item.cod);
                await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...ex, qtd: ex.qtd - item.qtd}) });
                await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: item.cod, nome: item.nome, qtd: item.qtd, tipo_mov: 'SAÍDA', usuario: userAtivo.u}) });
            }
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("MYMEDIA - PEDIDO DE SAÍDA", 15, 20);
            doc.autoTable({ startY: 30, head: [['Cód', 'Produto', 'Qtd']], body: carrinho.map(i => [i.cod, i.nome, i.qtd]) });
            doc.save(`pedido_mymedia.pdf`);
            carrinho = []; document.getElementById('carrinho-area').classList.add('hidden'); carregar();
        }

        function cancelarSaida() { carrinho = []; document.getElementById('carrinho-area').classList.add('hidden'); }

        async function lancar(tipo) {
            const cod = document.getElementById('p-cod').value.trim();
            const nome = document.getElementById('p-nome').value.trim();
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const min = parseInt(document.getElementById('p-min').value) || 5;
            const ex = estoque.find(x => x.cod == cod);
            let finalQtd = (tipo === 'ENTRADA' && ex) ? ex.qtd + qtd : qtd;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd: finalQtd, min}) });
            await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd, tipo_mov: tipo, usuario: userAtivo.u}) });
            carregar();
        }

        async function importarMassa(input) {
            const r = new FileReader();
            r.onload = async (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: ["cod", "nome", "qtd", "min"], range: 1});
                for(const f of rows) {
                    if(f.cod && f.nome) await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: f.cod.toString(), nome: f.nome, qtd: parseInt(f.qtd), min: parseInt(f.min) || 5}) });
                }
                carregar();
                alert("Importação MyMedia concluída!");
            };
            r.readAsArrayBuffer(input.files[0]);
        }

        function aba(t) {
            document.getElementById('aba-estoque').classList.toggle('hidden', t !== 'estoque');
            document.getElementById('aba-hist').classList.toggle('hidden', t !== 'hist');
            if(t === 'hist') carregarHist();
        }

        async function carregarHist() {
            const res = await fetch(`${API}/historico`);
            const h = await res.json();
            document.getElementById('lista-hist-container').innerHTML = h.reverse().map(x => `
                <div style="background:#f8fafc; padding:15px; border-radius:10px; border:1px solid #e2e8f0; font-size:13px">
                    <b style="color:var(--primary)">${new Date(x.data).toLocaleString()}</b> | 
                    <span style="font-weight:bold; color:${x.tipo_mov === 'ENTRADA' ? 'var(--success)' : 'var(--danger)'}">${x.tipo_mov}</span>: 
                    [${x.cod}] ${x.nome} (Qtd: ${x.qtd}) - Operador: ${x.usuario}
                </div>
            `).join('');
        }

        async function apagar(c) { if(confirm("Excluir item?")) { await fetch(`${API}/estoque/${c}`, {method:'DELETE'}); carregar(); } }
        async function limparEstoqueTodo() { if(confirm("Zerar estoque?")) { for(let p of estoque) await fetch(`${API}/estoque/${p.cod}`, {method:'DELETE'}); carregar(); } }
        function buscaAuto(c) { const p = estoque.find(x => x.cod == c.trim()); if(p) { document.getElementById('p-nome').value = p.nome; document.getElementById('p-min').value = p.min; } }
        function filtrarLista(v) {
            const termo = v.toLowerCase();
            document.querySelectorAll('.item-produto').forEach(el => el.style.display = el.getAttribute('data-busca').toLowerCase().includes(termo) ? "flex" : "none");
        }
    </script>
</body>
</html>
