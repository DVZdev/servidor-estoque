<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMedia - Sistema de Expedição</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff6600; 
            --primary-hover: #e65c00;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --border: #f1f5f9;
        }

        * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; transition: all 0.2s ease; }
        body { margin: 0; padding: 0; background-color: #0f172a; }
        .hidden { display: none !important; }

        /* LOGIN */
        #tela-login {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover; z-index: 10000;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 32px;
            width: 100%; max-width: 400px; text-align: center;
        }
        .login-card input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 14px; border: none; outline: none; }

        /* PAINEL */
        #painel.ativo { min-height: 100vh; background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('https://images.unsplash.com/photo-1553413077-190dd305871c?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.95); padding: 15px 25px; border-radius: 20px; margin-bottom: 25px; }
        .card-principal { background: rgba(255, 255, 255, 0.98); border-radius: 24px; padding: 25px; min-height: 60vh; }

        /* COMPONENTES */
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-ghost { background: #f1f5f9; color: var(--text-sub); }
        .btn-clear { background: #fee2e2; color: var(--danger); }
        
        .item-produto { background: white; border: 1px solid var(--border); padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; font-size: 12px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f1f5f9; }
        .dif-negativa { color: var(--danger); font-weight: bold; }
        .dif-positiva { color: var(--success); font-weight: bold; }

        #carrinho-area { background: #fff7ed; border: 2px dashed var(--primary); padding: 20px; border-radius: 20px; margin-bottom: 25px; }
        .hist-item { background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 8px; font-size: 13px; border-left: 4px solid var(--primary); }

        /* MODAL PROGRESSO */
        #modal-progresso { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; }
        .progresso-container { width: 300px; height: 12px; background: #334155; border-radius: 6px; margin-top: 15px; overflow: hidden; }
        #barra-preenchimento { width: 0%; height: 100%; background: var(--primary); transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="modal-progresso" class="hidden">
        <h3>Processando Inventário...</h3>
        <div class="progresso-container"><div id="barra-preenchimento"></div></div>
        <p id="contagem-progresso" style="margin-top:10px;">0 / 0</p>
    </div>

    <div id="tela-login">
        <div class="login-card">
            <h1 style="color:white; margin:0;">MyMedia</h1>
            <p style="color:white; opacity:0.7; margin-bottom:20px;">Logística</p>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="autenticar('login')">Entrar</button>
            <button class="btn" style="background:none; color:white; font-size:12px; margin-top:10px; width:100%" onclick="autenticar('register')">Criar conta</button>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div class="container">
            <div class="header-nav">
                <div style="font-weight:800; color:var(--primary); font-size:20px;">MYMEDIA</div>
                <div style="display:flex; gap:10px">
                    <button class="btn btn-ghost" onclick="aba('estoque')">Estoque</button>
                    <button id="btn-hist-nav" class="btn btn-ghost hidden" onclick="aba('hist')">Histórico</button>
                    <button class="btn btn-clear" onclick="location.reload()">Sair</button>
                </div>
            </div>

            <div class="card-principal">
                <div id="aba-estoque">
                    <div id="carrinho-area" class="hidden">
                        <h4 style="margin:0 0 10px 0;">🛒 Itens do Pedido</h4>
                        <div id="lista-carrinho"></div>
                        <div style="margin-top:15px; display:flex; gap:10px">
                            <button class="btn btn-success" onclick="finalizarPedido()">Finalizar e Gerar PDF</button>
                            <button class="btn btn-ghost" onclick="limparCarrinho()">Limpar</button>
                        </div>
                    </div>

                    <div id="area-admin" class="hidden">
                        <div style="display:grid; grid-template-columns: 1fr 2fr 1fr 1fr; gap:10px; margin-bottom:15px;">
                            <input type="text" id="p-cod" placeholder="Cód" oninput="buscaAuto(this.value)" style="padding:10px; border-radius:8px; border:1px solid #ddd">
                            <input type="text" id="p-nome" placeholder="Produto" style="padding:10px; border-radius:8px; border:1px solid #ddd">
                            <input type="number" id="p-qtd" placeholder="Qtd Armazém" style="padding:10px; border-radius:8px; border:1px solid #ddd">
                            <input type="number" id="p-sis" placeholder="Qtd Sistema" style="padding:10px; border-radius:8px; border:1px solid #ddd">
                        </div>
                        <div style="display:flex; gap:10px; margin-bottom:25px; flex-wrap: wrap;">
                            <button class="btn btn-success" onclick="lancar('ENTRADA')">Lançar/Atualizar</button>
                            <button class="btn btn-primary" onclick="addAoCarrinho()">+ Adicionar Pedido</button>
                            <button class="btn btn-clear" onclick="limparEstoqueTotal()">Zerar Tudo</button>
                            <label class="btn btn-ghost">📥 Importar Excel <input type="file" style="display:none" onchange="importarMassa(this)"></label>
                        </div>
                    </div>

                    <input type="text" placeholder="🔍 Pesquisar por código ou nome..." style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:20px;" onkeyup="filtrarLista(this.value)">
                    <div id="corpo-estoque-lista"></div>
                </div>

                <div id="aba-hist" class="hidden">
                    <h3 style="margin-top:0">🕒 Histórico de Movimentações</h3>
                    <div id="lista-hist-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], carrinho = [], userAtivo = null;

        async function autenticar(modo) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Preencha tudo!");
            const res = await fetch(`${API}/auth/${modo}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            if(res.ok) {
                userAtivo = await res.json();
                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden').classList.add('ativo');
                if(userAtivo.isadmin) {
                    document.getElementById('area-admin').classList.remove('hidden');
                    document.getElementById('btn-hist-nav').classList.remove('hidden');
                }
                carregar();
            } else alert("Erro no acesso.");
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            let dados = await res.json();
            estoque = dados.sort((a, b) => parseInt(a.cod) - parseInt(b.cod));
            renderLista();
        }

        function renderLista() {
            document.getElementById('corpo-estoque-lista').innerHTML = estoque.map(p => {
                const qtdS = p.qtd_sistema || 0;
                const dif = p.qtd - qtdS;
                return `
                <div class="item-produto" data-busca="${p.cod} ${p.nome}">
                    <div style="flex:1">
                        <b>${p.nome}</b> <small style="color:var(--text-sub)">(ID: ${p.cod})</small>
                        <div class="grid-info">
                            <div>Armazém: <b>${p.qtd}</b></div>
                            <div>Sistema: <b>${qtdS}</b></div>
                            <div class="${dif < 0 ? 'dif-negativa' : (dif > 0 ? 'dif-positiva' : '')}">Dif: <b>${dif}</b></div>
                        </div>
                    </div>
                    <div style="display:flex; gap:5px">
                        ${userAtivo.isadmin ? `<button style="background:none; border:none; cursor:pointer;" onclick="editarQtdRapido('${p.cod}','${p.nome}',${p.qtd},${qtdS})">✏️</button>` : ''}
                        ${userAtivo.isadmin ? `<button style="background:none; border:none; cursor:pointer; color:red; font-weight:bold;" onclick="excluirProduto('${p.cod}')">×</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        async function editarQtdRapido(cod, nome, qA, qS) {
            const nA = prompt(`Novo Armazém para ${nome}:`, qA); if(nA === null) return;
            const nS = prompt(`Novo Sistema para ${nome}:`, qS); if(nS === null) return;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd: parseInt(nA), qtd_sistema: parseInt(nS)}) });
            carregar();
        }

        async function excluirProduto(cod) {
            if(!confirm("Excluir?")) return;
            await fetch(`${API}/estoque/${cod}`, { method: 'DELETE' });
            carregar();
        }

        async function limparEstoqueTotal() {
            if(!confirm("CUIDADO: Isso apagará TUDO!")) return;
            for(let p of estoque) await fetch(`${API}/estoque/${p.cod}`, { method: 'DELETE' });
            carregar();
        }

        function addAoCarrinho() {
            const cod = document.getElementById('p-cod').value;
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const p = estoque.find(x => x.cod == cod);
            if(!p || isNaN(qtd)) return alert("Dados inválidos!");
            carrinho.push({ cod: p.cod, nome: p.nome, qtd: qtd });
            document.getElementById('carrinho-area').classList.remove('hidden');
            renderCarrinho();
        }

        function renderCarrinho() {
            document.getElementById('lista-carrinho').innerHTML = carrinho.map((item, i) => `
                <div style="display:flex; justify-content:space-between; padding:5px; background:white; margin-bottom:2px; border-radius:5px;">
                    <span>${item.nome} (x${item.qtd})</span>
                    <button onclick="carrinho.splice(${i},1); renderCarrinho();" style="color:red; border:none; background:none;">✖</button>
                </div>`).join('');
            if(!carrinho.length) document.getElementById('carrinho-area').classList.add('hidden');
        }

        async function finalizarPedido() {
            for(let i of carrinho) {
                const ex = estoque.find(x => x.cod == i.cod);
                await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...ex, qtd: ex.qtd - i.qtd}) });
                await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: i.cod, nome: i.nome, qtd: i.qtd, tipo_mov: 'SAÍDA', usuario: userAtivo.u}) });
            }
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("MYMEDIA - PEDIDO", 10, 10);
            doc.autoTable({ head: [['Cód', 'Item', 'Qtd']], body: carrinho.map(x => [x.cod, x.nome, x.qtd]) });
            doc.save(`pedido.pdf`);
            carrinho = []; renderCarrinho(); carregar();
        }

        async function importarMassa(input) {
            const r = new FileReader();
            r.onload = async (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: ["cod", "nome", "qtd", "qtd_sistema"], range: 1});
                const validos = rows.filter(f => f.cod);
                document.getElementById('modal-progresso').classList.remove('hidden');
                let c = 0;
                for(const f of validos) {
                    await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: f.cod.toString(), nome: f.nome, qtd: parseInt(f.qtd)||0, qtd_sistema: parseInt(f.qtd_sistema)||0}) });
                    c++;
                    document.getElementById('barra-preenchimento').style.width = (c/validos.length*100) + "%";
                    document.getElementById('contagem-progresso').innerText = `${c} / ${validos.length}`;
                }
                document.getElementById('modal-progresso').classList.add('hidden');
                carregar(); alert("Importado!");
            };
            r.readAsArrayBuffer(input.files[0]);
        }

        async function lancar(tipo) {
            const cod = document.getElementById('p-cod').value;
            const nome = document.getElementById('p-nome').value;
            const qtd = parseInt(document.getElementById('p-qtd').value) || 0;
            const sis = parseInt(document.getElementById('p-sis').value) || 0;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd, qtd_sistema: sis}) });
            await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd, tipo_mov: tipo, usuario: userAtivo.u}) });
            carregar();
        }

        function aba(t) {
            document.getElementById('aba-estoque').classList.toggle('hidden', t !== 'estoque');
            document.getElementById('aba-hist').classList.toggle('hidden', t !== 'hist');
            if(t === 'hist') carregarHist();
        }

        async function carregarHist() {
            const res = await fetch(`${API}/historico`);
            const h = await res.json();
            document.getElementById('lista-hist-container').innerHTML = h.reverse().map(x => `
                <div class="hist-item"><b>${x.nome}</b> (${x.qtd}) - ${x.tipo_mov} <br><small>${new Date(x.data).toLocaleString()} por ${x.usuario}</small></div>`).join('');
        }

        function buscaAuto(c) {
            const p = estoque.find(x => x.cod == c.trim());
            if(p) { document.getElementById('p-nome').value = p.nome; document.getElementById('p-qtd').value = p.qtd; document.getElementById('p-sis').value = p.qtd_sistema || 0; }
        }

        function filtrarLista(v) {
            const t = v.toLowerCase();
            document.querySelectorAll('.item-produto').forEach(el => el.style.display = el.getAttribute('data-busca').toLowerCase().includes(t) ? "flex" : "none");
        }
        
        function limparCarrinho() { carrinho = []; renderCarrinho(); }
    </script>
</body>
</html>
