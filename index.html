<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Expedição v27 - Full</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f1f5f9; --success: #059669; --danger: #be123c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        /* Estilo do Tradutor */
        #google_translate_element { margin-bottom: 10px; text-align: right; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { padding: 12px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; color: white; background: var(--accent); transition: 0.2s; }
        button:hover { opacity: 0.8; }
        
        .nav { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; color: #64748b; font-size: 13px; }
        .alert-min { color: var(--danger); font-weight: bold; background: #fff1f2; }
        
        @media (max-width: 768px) { .layout { grid-template-columns: 1fr !important; } }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="tela-login">
        <div class="card" style="max-width: 380px; margin: 60px auto; border-top: 5px solid var(--accent);">
            <h2 style="text-align:center">Acesso ao Sistema</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="autenticar('login')" style="flex:1">Entrar</button>
                <button onclick="autenticar('register')" style="flex:1; background:var(--success)">Registrar</button>
            </div>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div class="nav">
            <div>📦 <b>Expedição Digital</b> | <span id="nome-exibir"></span></div>
            <div style="display:flex; gap:8px">
                <button onclick="aba('estoque')">Estoque</button>
                <button id="btn-hist-nav" class="hidden" onclick="aba('hist')">Histórico</button>
                <button onclick="location.reload()" style="background:var(--danger)">Sair</button>
            </div>
        </div>

        <div id="aba-estoque" class="card">
            <div id="area-admin" class="hidden" style="margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px;">
                <h3>⚙️ Painel de Controle (Admin)</h3>
