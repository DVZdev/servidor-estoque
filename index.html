<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMedia - Sistema de Expedição</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --primary: #ff6600; 
            --primary-dark: #e65c00;
            --text: #1e293b;
            --success: #059669;
            --danger: #be123c;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            color: var(--text);
            min-height: 100vh;
            background-color: #1e293b;
        }

        /* TELA DE LOGIN COM A IMAGEM QUE VOCÊ ENVIOU (VIA PLACEHOLDER SEGURO) */
        #tela-login {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            /* Se a imagem local falhar, este gradiente garante que não fique apenas cinza */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            z-index: 9999;
        }

        /* CAIXA DE LOGIN COM TRANSPARÊNCIA REAL (GLASS) */
        .login-card {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 40px; 
            border-radius: 28px; 
            width: 90%; 
            max-width: 360px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            text-align: center; 
            color: white;
        }

        .login-card input { 
            background: rgba(255, 255, 255, 0.9); 
            border: none; padding: 14px; 
            border-radius: 12px; width: 100%; 
            margin-bottom: 15px; box-sizing: border-box; 
            color: #1e293b;
        }

        /* FUNDO INTERNO (ESTOQUE) */
        #painel.ativo {
            min-height: 100vh;
            background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), 
                        url('https://images.unsplash.com/photo-1605379399642-870262d3d051?q=80&w=1900&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }

        .hidden { display: none !important; }
        #painel { padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin: 0 auto 25px auto; max-width: 1200px; }
        button { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; color: white; background: var(--primary); transition: 0.2s; }
        button:hover { background: var(--primary-dark); }
        .nav { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 25px; }
        .item-produto { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        .item-produto.alerta { border-left: 5px solid var(--danger); }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-card">
            <h1 style="margin:0;">MyMedia</h1>
            <p style="margin-bottom: 30px; opacity: 0.8;">Expedição</p>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="autenticar('login')" style="width: 100%;">Entrar</button>
            <button onclick="autenticar('register')" style="background:none; border: 1px solid rgba(255,255,255,0.3); margin-top:10px; font-size:12px; width: 100%;">Registrar</button>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div id="google_translate_element"></div>
        <div class="nav">
            <div>MYMEDIA | <b>ESTOQUE</b></div>
            <button onclick="location.reload()" style="background:white; color:var(--primary); padding: 8px 15px;">Sair</button>
        </div>

        <div id="aba-estoque" class="card">
            <div id="area-admin" class="hidden">
                <div style="display:flex; gap:10px; margin-bottom: 20px;">
                    <input type="text" id="p-cod" placeholder="Cód" style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="p-nome" placeholder="Produto" style="padding:10px; border-radius:8px; border:1px solid #ddd; flex:1;">
                    <input type="number" id="p-qtd" placeholder="Qtd" style="padding:10px; border-radius:8px; border:1px solid #ddd; width:80px;">
                    <input type="number" id="p-min" placeholder="Mín" style="padding:10px; border-radius:8px; border:1px solid #ddd; width:80px;">
                    <button onclick="lancar('ENTRADA')">Adicionar</button>
                </div>
            </div>
            <input type="text" placeholder="Pesquisar..." onkeyup="filtrarLista(this.value)" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:20px;">
            <div id="corpo-estoque-lista"></div>
        </div>
    </div>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], userAtivo = null;

        async function autenticar(modo) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API}/auth/${modo}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            if(res.ok) {
                userAtivo = await res.json();
                document.getElementById('tela-login').style.display = 'none';
                const painel = document.getElementById('painel');
                painel.classList.remove('hidden');
                painel.classList.add('ativo');
                if(userAtivo.isadmin) document.getElementById('area-admin').classList.remove('hidden');
                carregar();
            } else alert("Erro na autenticação");
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            estoque = await res.json();
            renderLista();
        }

        function renderLista() {
            document.getElementById('corpo-estoque-lista').innerHTML = estoque.map(p => `
                <div class="item-produto ${p.qtd <= p.min ? 'alerta' : ''}" data-busca="${p.cod} ${p.nome}">
                    <b>${p.nome}</b> (Cód: ${p.cod}) - <span style="color:var(--primary)">Qtd: ${p.qtd}</span>
                </div>
            `).join('');
        }

        function filtrarLista(v) {
            const termo = v.toLowerCase();
            document.querySelectorAll('.item-produto').forEach(el => {
                el.style.display = el.getAttribute('data-busca').toLowerCase().includes(termo) ? "block" : "none";
            });
        }

        async function lancar(tipo) {
            const cod = document.getElementById('p-cod').value;
            const nome = document.getElementById('p-nome').value;
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const min = parseInt(document.getElementById('p-min').value) || 0;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd, min}) });
            carregar();
        }
    </script>
</body>
</html>
