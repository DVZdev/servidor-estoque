<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMedia - Sistema de Expedição</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --primary: #ff6600; /* Laranja MyMedia */
            --primary-dark: #e65c00;
            --bg: #ffffff; 
            --card-bg: #fdfdfd;
            --text: #1e293b;
            --success: #059669;
            --danger: #be123c;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        #google_translate_element { margin-bottom: 15px; text-align: right; }
        
        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px; 
        }

        .campo-box label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        input { 
            padding: 12px; 
            border: 2px solid #f1f5f9; 
            border-radius: 8px; 
            font-size: 14px; 
            background: #f8fafc;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); outline: none; background: white; }

        button { 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            color: white; 
            background: var(--primary); 
            transition: 0.2s;
        }
        button:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }

        /* Estilo dos Cartões do Inventário - Ordem Corrigida */
        #corpo-estoque-lista { display: flex; flex-direction: column; gap: 12px; }
        .item-produto { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column; 
            gap: 6px;
        }
        .item-produto.alerta { border-left: 6px solid var(--danger); }
        .valor-nome { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .dado-linha { font-size: 14px; display: flex; align-items: center; }
        .dado-linha b { min-width: 110px; color: #94a3b8; font-size: 11px; text-transform: uppercase; }

        .nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--primary); 
            color: white; 
            padding: 18px 25px; 
            border-radius: 14px; 
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="tela-login">
        <div class="card" style="max-width: 400px; margin: 80px auto; text-align: center;">
            <h1 style="color: var(--primary);">MyMedia</h1>
            <div class="campo-box" style="text-align: left; margin-bottom: 15px;"><label>Usuário</label><input type="text" id="user"></div>
            <div class="campo-box" style="text-align: left; margin-bottom: 25px;"><label>Senha</label><input type="password" id="pass"></div>
            <button onclick="autenticar('login')" style="width:100%; margin-bottom:12px">Entrar</button>
            <button onclick="autenticar('register')" style="width:100%; background: none; color: var(--primary); border: 1px solid var(--primary);">Registrar</button>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div class="nav">
            <div>MYMEDIA | <b>ESTOQUE</b></div>
            <div style="display:flex; gap:10px;">
                <button onclick="aba('estoque')" style="background:rgba(255,255,255,0.2); font-size:12px;">Estoque</button>
                <button id="btn-hist-nav" class="hidden" onclick="aba('hist')" style="background:rgba(255,255,255,0.2); font-size:12px;">Histórico</button>
                <button onclick="location.reload()" style="background:white; color:var(--primary); font-size:12px;">Sair</button>
            </div>
        </div>

        <div id="aba-estoque" class="card">
            <div id="carrinho-area" class="hidden" style="background: #fff7ed; border: 2px dashed var(--primary); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <h4 style="margin:0; color:var(--primary)">🛒 Pedido de Saída</h4>
                <div id="lista-carrinho"></div>
                <button onclick="finalizarSaida()" style="margin-top:10px">Gerar PDF e Baixar Estoque</button>
                <button onclick="cancelarSaida()" style="background:#64748b">Cancelar</button>
            </div>

            <div id="area-admin" class="hidden">
                <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; align-items: flex-end;">
                    <div class="campo-box" style="width:130px"><label>Código</label><input type="text" id="p-cod" oninput="buscaAuto(this.value)"></div>
                    <div class="campo-box" style="flex:1;"><label>Nome do Produto</label><input type="text" id="p-nome"></div>
                    <div class="campo-box" style="width:80px"><label>Qtd</label><input type="number" id="p-qtd" value="1"></div>
                    <div class="campo-box" style="width:80px"><label>Mín</label><input type="number" id="p-min" value="5"></div>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:30px;">
                    <button onclick="lancar('ENTRADA')" class="btn-success">+ Entrada</button>
                    <button onclick="addCarrinho()">- Preparar Saída</button>
                    <label style="background:#475569; color:white; padding:12px; border-radius:8px; cursor:pointer; font-weight:700; font-size:13px">
                        📥 Importar Excel <input type="file" accept=".xlsx" style="display:none" onchange="importarMassa(this)">
                    </label>
                </div>
            </div>

            <input type="text" placeholder="🔍 Pesquisar..." onkeyup="filtrarLista(this.value)" style="margin-bottom:20px;">
            <div id="corpo-estoque-lista"></div>
        </div>

        <div id="aba-hist" class="card hidden">
            <h3>🕒 Histórico</h3>
            <div id="lista-hist-container"></div>
        </div>
    </div>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], carrinho = [], userAtivo = null;

        async function autenticar(modo) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API}/auth/${modo}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            if(res.ok) {
                if(modo === 'register') alert("Registrado! Agora faça login.");
                else {
                    userAtivo = await res.json();
                    document.getElementById('tela-login').classList.add('hidden');
                    document.getElementById('painel').classList.remove('hidden');
                    if(userAtivo.isadmin) { document.getElementById('area-admin').classList.remove('hidden'); document.getElementById('btn-hist-nav').classList.remove('hidden'); }
                    carregar();
                }
            }
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            estoque = await res.json();
            renderLista();
        }

        function renderLista() {
            const container = document.getElementById('corpo-estoque-lista');
            // ORDEM CORRIGIDA: NOME PRIMEIRO, DEPOIS CÓDIGO
            container.innerHTML = estoque.map(p => `
                <div class="item-produto ${p.qtd <= p.min ? 'alerta' : ''}" data-busca="${p.cod} ${p.nome}">
                    <div class="valor-nome">${p.nome}</div>
                    <div class="dado-linha"><b>Código:</b> ${p.cod}</div>
                    <div class="dado-linha"><b>Qtd em Estoque:</b> <span style="font-weight:800; color:var(--success)">${p.qtd}</span></div>
                    <div class="dado-linha"><b>Aviso Mínimo:</b> ${p.min}</div>
                    ${userAtivo.isadmin ? `<button onclick="apagar('${p.cod}')" style="background:none; color:var(--danger); padding:0; font-size:11px; margin-top:10px; width:fit-content;">Remover Item</button>` : ''}
                </div>
            `).join('');
        }

        function addCarrinho() {
            const cod = document.getElementById('p-cod').value.trim();
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const p = estoque.find(x => x.cod == cod);
            if(!p || qtd > p.qtd) return alert("Erro no estoque!");
            carrinho.push({ cod: p.cod, nome: p.nome, qtd: qtd });
            renderCarrinho();
            document.getElementById('carrinho-area').classList.remove('hidden');
        }

        function renderCarrinho() {
            document.getElementById('lista-carrinho').innerHTML = carrinho.map((item, index) => `
                <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #ddd;">
                    <span>${item.nome} (x${item.qtd})</span>
                    <button onclick="carrinho.splice(${index},1); renderCarrinho();" style="background:none; color:red; padding:0;">✖</button>
                </div>
            `).join('');
        }

        async function finalizarSaida() {
            for(let item of carrinho) {
                const ex = estoque.find(x => x.cod == item.cod);
                await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...ex, qtd: ex.qtd - item.qtd}) });
                await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: item.cod, nome: item.nome, qtd: item.qtd, tipo_mov: 'SAÍDA', usuario: userAtivo.u}) });
            }
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("MYMEDIA - PEDIDO", 10, 10);
            doc.autoTable({ head: [['Produto', 'Qtd']], body: carrinho.map(i => [i.nome, i.qtd]) });
            doc.save('pedido.pdf');
            carrinho = []; document.getElementById('carrinho-area').classList.add('hidden'); carregar();
        }

        function cancelarSaida() { carrinho = []; document.getElementById('carrinho-area').classList.add('hidden'); }

        async function lancar(tipo) {
            const cod = document.getElementById('p-cod').value.trim();
            const nome = document.getElementById('p-nome').value.trim();
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const min = parseInt(document.getElementById('p-min').value) || 5;
            const ex = estoque.find(x => x.cod == cod);
            let finalQtd = (tipo === 'ENTRADA' && ex) ? ex.qtd + qtd : qtd;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd: finalQtd, min}) });
            await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd, tipo_mov: tipo, usuario: userAtivo.u}) });
            carregar();
        }

        async function importarMassa(input) {
            const r = new FileReader();
            r.onload = async (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: ["cod", "nome", "qtd", "min"], range: 1});
                for(const f of rows) {
                    if(f.cod && f.nome) await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: f.cod.toString(), nome: f.nome, qtd: parseInt(f.qtd), min: parseInt(f.min) || 5}) });
                }
                carregar();
            };
            r.readAsArrayBuffer(input.files[0]);
        }

        function aba(t) {
            document.getElementById('aba-estoque').classList.toggle('hidden', t !== 'estoque');
            document.getElementById('aba-hist').classList.toggle('hidden', t !== 'hist');
            if(t === 'hist') carregarHist();
        }

        async function carregarHist() {
            const res = await fetch(`${API}/historico`);
            const h = await res.json();
            // HISTÓRICO CORRIGIDO: NOME EM DESTAQUE
            document.getElementById('lista-hist-container').innerHTML = h.reverse().map(x => `
                <div style="background:#f8fafc; padding:10px; border-bottom:1px solid #eee; margin-bottom:5px; border-radius:8px;">
                    <b style="color:var(--primary)">${x.nome}</b> [Código: ${x.cod}]<br>
                    <small>${new Date(x.data).toLocaleString()} - <b>${x.tipo_mov}</b> de ${x.qtd} unid. (Por: ${x.usuario})</small>
                </div>
            `).join('');
        }

        async function apagar(c) { if(confirm("Remover?")) { await fetch(`${API}/estoque/${c}`, {method:'DELETE'}); carregar(); } }
        function buscaAuto(c) { const p = estoque.find(x => x.cod == c.trim()); if(p) { document.getElementById('p-nome').value = p.nome; document.getElementById('p-min').value = p.min; } }
        function filtrarLista(v) {
            const termo = v.toLowerCase();
            document.querySelectorAll('.item-produto').forEach(el => el.style.display = el.getAttribute('data-busca').toLowerCase().includes(termo) ? "flex" : "none");
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
