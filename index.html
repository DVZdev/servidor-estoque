<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMedia - Sistema de Expedição</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ff6600; --success: #10b981; --danger: #ef4444; --border: #f1f5f9; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1553413077-190dd305871c?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* LOGIN */
        #tela-login { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0f172a; z-index: 10000; }
        .login-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 40px; border-radius: 32px; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .login-card input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: none; outline: none; }

        /* PAINEL */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.95); padding: 15px 25px; border-radius: 20px; margin-bottom: 25px; }
        .card-principal { background: rgba(255, 255, 255, 0.98); border-radius: 24px; padding: 25px; min-height: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-ghost { background: #f1f5f9; color: #64748b; }
        .btn-clear { background: #fee2e2; color: var(--danger); }
        
        .item-produto { background: white; border: 1px solid var(--border); padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; font-size: 12px; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        
        #carrinho-area { background: #fff7ed; border: 2px dashed var(--primary); padding: 20px; border-radius: 20px; margin-bottom: 25px; }
        .hist-item { background: #f8fafc; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--primary); font-size: 13px; }

        #modal-progresso { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; }
        .progresso-container { width: 300px; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin: 15px 0; }
        #barra-preenchimento { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s; }
    </style>
</head>
<body>

    <div id="modal-progresso" class="hidden">
        <h3 id="txt-progresso">Importando Inventário...</h3>
        <div class="progresso-container"><div id="barra-preenchimento"></div></div>
        <p id="contagem-progresso">0 / 0</p>
    </div>

    <div id="tela-login">
        <div class="login-card">
            <h1 style="color:white; margin:0 0 20px 0;">MYMEDIA</h1>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="autenticar('login')">Entrar</button>
        </div>
    </div>

    <div id="painel" class="hidden">
        <div class="container">
            <div class="header-nav">
                <div style="font-weight:800; color:var(--primary); font-size:22px;">MYMEDIA</div>
                <div style="display:flex; gap:10px">
                    <button class="btn btn-ghost" onclick="aba('estoque')">📦 Estoque</button>
                    <button class="btn btn-ghost" onclick="aba('hist')">🕒 Histórico</button>
                    <button class="btn btn-clear" onclick="location.reload()">Sair</button>
                </div>
            </div>

            <div class="card-principal">
                <div id="aba-estoque">
                    <div id="carrinho-area" class="hidden">
                        <h4 style="margin:0 0 10px 0;">🛒 Itens do Pedido</h4>
                        <div id="lista-carrinho"></div>
                        <div style="margin-top:15px; display:flex; gap:10px">
                            <button class="btn btn-success" onclick="finalizarPedido()">Finalizar Saída e PDF</button>
                            <button class="btn btn-ghost" onclick="limparCarrinho()">Cancelar</button>
                        </div>
                    </div>

                    <div style="border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 20px;">
                        <div style="display:grid; grid-template-columns: 1fr 2fr 1fr 1fr; gap:10px; margin-bottom:15px;">
                            <input type="text" id="p-cod" placeholder="Código" oninput="buscaAuto(this.value)" style="padding:12px; border-radius:10px; border:1px solid #ddd">
                            <input type="text" id="p-nome" placeholder="Produto" style="padding:12px; border-radius:10px; border:1px solid #ddd">
                            <input type="number" id="p-qtd" placeholder="Qtd Armazém" style="padding:12px; border-radius:10px; border:1px solid #ddd">
                            <input type="number" id="p-sis" placeholder="Qtd Sistema" style="padding:12px; border-radius:10px; border:1px solid #ddd">
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap: wrap;">
                            <button class="btn btn-success" onclick="lancar()">Salvar Item</button>
                            <button class="btn btn-primary" onclick="addAoCarrinho()">+ Adicionar Pedido</button>
                            <button class="btn btn-clear" onclick="limparEstoqueTotal()">Zerar Tudo</button>
                            <label class="btn btn-ghost">📥 Importar Excel <input type="file" style="display:none" onchange="importarMassa(this)"></label>
                        </div>
                    </div>

                    <input type="text" placeholder="🔍 Filtrar lista..." style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:20px;" onkeyup="filtrarLista(this.value)">
                    <div id="corpo-estoque-lista"></div>
                </div>

                <div id="aba-hist" class="hidden">
                    <h3 style="margin-top:0">🕒 Histórico de Movimentações</h3>
                    <div id="lista-hist-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://servidor-estoque-8g56.onrender.com';
        let estoque = [], carrinho = [], userAtivo = null;

        async function autenticar(modo) {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Preencha os campos!");
            const res = await fetch(`${API}/auth/${modo}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({u, p}) });
            if(res.ok) {
                userAtivo = await res.json();
                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                carregar();
            } else alert("Erro no login.");
        }

        async function carregar() {
            const res = await fetch(`${API}/estoque`);
            let dados = await res.json();
            // ORDEM DO MENOR CÓDIGO PARA O MAIOR
            estoque = dados.sort((a, b) => parseInt(a.cod) - parseInt(b.cod));
            renderLista();
        }

        function renderLista() {
            document.getElementById('corpo-estoque-lista').innerHTML = estoque.map(p => {
                const qS = p.qtd_sistema || 0;
                const dif = p.qtd - qS;
                return `
                <div class="item-produto" data-busca="${p.cod} ${p.nome}">
                    <div style="flex:1">
                        <b>${p.nome}</b> <small>(ID: ${p.cod})</small>
                        <div class="grid-info">
                            <div>Armazém: <b>${p.qtd}</b></div>
                            <div>Sistema: <b>${qS}</b></div>
                            <div style="color:${dif < 0 ? 'red' : (dif > 0 ? 'green' : '#64748b')}; font-weight:bold">Dif: ${dif}</div>
                        </div>
                    </div>
                    <div style="display:flex; gap:15px">
                        <button onclick="editarRapido('${p.cod}','${p.nome}',${p.qtd},${qS})" style="border:none; background:none; cursor:pointer; font-size:18px">✏️</button>
                        <button onclick="excluirProduto('${p.cod}')" style="border:none; background:none; cursor:pointer; color:red; font-size:18px">❌</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function importarMassa(input) {
            const r = new FileReader();
            r.onload = async (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                if(!rows.length) return;

                document.getElementById('modal-progresso').classList.remove('hidden');
                let c = 0;
                for(const f of rows) {
                    // BUSCA FLEXÍVEL DE COLUNAS
                    const vSis = f.sistema || f.Sistema || f.SISTEMA || f.qtd_sistema || f.sis || 0;
                    const vArm = f.qtd || f.armazem || f.Armazém || f.Armazem || f.quantidade || 0;
                    const vCod = f.cod || f.codigo || f.Código || f.Codigo || f.ID;
                    const vNom = f.nome || f.produto || f.Nome || f.Produto;

                    if(vCod) {
                        await fetch(`${API}/estoque`, { 
                            method: 'POST', 
                            headers: {'Content-Type': 'application/json'}, 
                            body: JSON.stringify({ cod: vCod.toString(), nome: vNom, qtd: parseInt(vArm), qtd_sistema: parseInt(vSis) }) 
                        });
                        c++;
                        document.getElementById('barra-preenchimento').style.width = (c / rows.length * 100) + "%";
                        document.getElementById('contagem-progresso').innerText = `${c} / ${rows.length}`;
                    }
                }
                // REGISTRA NO HISTÓRICO
                await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({nome: "Importação via Excel", qtd: c, tipo_mov: 'ENTRADA/ATUALIZAÇÃO', usuario: userAtivo.u}) });
                
                document.getElementById('modal-progresso').classList.add('hidden');
                carregar(); alert("Sucesso!");
            };
            r.readAsArrayBuffer(input.files[0]);
            input.value = "";
        }

        async function finalizarPedido() {
            for(let i of carrinho) {
                const ex = estoque.find(x => x.cod == i.cod);
                await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...ex, qtd: ex.qtd - i.qtd}) });
                await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod: i.cod, nome: i.nome, qtd: i.qtd, tipo_mov: 'SAÍDA (PEDIDO)', usuario: userAtivo.u}) });
            }
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("MYMEDIA - PEDIDO", 15, 15);
            doc.autoTable({ head: [['Cód', 'Produto', 'Qtd']], body: carrinho.map(x => [x.cod, x.nome, x.qtd]), startY: 20 });
            doc.save(`pedido.pdf`);
            carrinho = []; renderCarrinho(); carregar();
        }

        async function carregarHist() {
            const res = await fetch(`${API}/historico`);
            const h = await res.json();
            document.getElementById('lista-hist-container').innerHTML = h.reverse().map(x => `
                <div class="hist-item"><b>${x.nome}</b> (${x.qtd}) - ${x.tipo_mov} <br><small>${new Date(x.data).toLocaleString()} por ${x.usuario}</small></div>`).join('');
        }

        async function lancar() {
            const cod = document.getElementById('p-cod').value;
            const nome = document.getElementById('p-nome').value;
            const qtd = parseInt(document.getElementById('p-qtd').value) || 0;
            const sis = parseInt(document.getElementById('p-sis').value) || 0;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd, qtd_sistema: sis}) });
            await fetch(`${API}/historico`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({nome: nome, qtd: qtd, tipo_mov: 'LANÇAMENTO MANUAL', usuario: userAtivo.u}) });
            carregar(); limparCampos();
        }

        async function editarRapido(cod, nome, qA, qS) {
            const nA = prompt(`Novo Armazém:`, qA); if(nA === null) return;
            const nS = prompt(`Novo Sistema:`, qS); if(nS === null) return;
            await fetch(`${API}/estoque`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cod, nome, qtd: parseInt(nA), qtd_sistema: parseInt(nS)}) });
            carregar();
        }

        function buscaAuto(c) { 
            const p = estoque.find(x => x.cod == c.trim()); 
            if(p) { 
                document.getElementById('p-nome').value = p.nome; 
                document.getElementById('p-qtd').value = p.qtd; 
                document.getElementById('p-sis').value = p.qtd_sistema || 0; 
            } 
        }
        function addAoCarrinho() {
            const cod = document.getElementById('p-cod').value;
            const qtd = parseInt(document.getElementById('p-qtd').value);
            const p = estoque.find(x => x.cod == cod);
            if(!p || isNaN(qtd)) return alert("Dados inválidos");
            carrinho.push({ cod: p.cod, nome: p.nome, qtd: qtd });
            document.getElementById('carrinho-area').classList.remove('hidden');
            renderCarrinho();
        }
        function renderCarrinho() {
            document.getElementById('lista-carrinho').innerHTML = carrinho.map((item, i) => `
                <div style="display:flex; justify-content:space-between; padding:8px; background:white; margin-bottom:5px; border-radius:8px; border:1px solid #eee">
                    <span>${item.nome} (x${item.qtd})</span>
                    <button onclick="carrinho.splice(${i},1); renderCarrinho();" style="color:red; border:none; background:none; cursor:pointer">✖</button>
                </div>`).join('');
            if(!carrinho.length) document.getElementById('carrinho-area').classList.add('hidden');
        }
        async function excluirProduto(cod) { if(confirm("Excluir?")) { await fetch(`${API}/estoque/${cod}`, { method: 'DELETE' }); carregar(); } }
        async function limparEstoqueTotal() { if(confirm("Zerar tudo?")) { for(let p of estoque) await fetch(`${API}/estoque/${p.cod}`, { method: 'DELETE' }); carregar(); } }
        function aba(t) { document.getElementById('aba-estoque').classList.toggle('hidden', t !== 'estoque'); document.getElementById('aba-hist').classList.toggle('hidden', t !== 'hist'); if(t === 'hist') carregarHist(); }
        function filtrarLista(v) { const t = v.toLowerCase(); document.querySelectorAll('.item-produto').forEach(el => el.style.display = el.getAttribute('data-busca').toLowerCase().includes(t) ? "flex" : "none"); }
        function limparCampos() { document.getElementById('p-cod').value=''; document.getElementById('p-nome').value=''; document.getElementById('p-qtd').value=''; document.getElementById('p-sis').value=''; }
        function limparCarrinho() { carrinho = []; renderCarrinho(); }
    </script>
</body>
</html>
