<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYMEDIA - Sistema Logístico</title>
    <style>
        /* Estilo do Modal de Processamento */
        #modal-processando {
            display: none; /* Escondido por padrão */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .titulo-processando {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Barra de progresso baseada no seu design */
        .container-barra {
            width: 400px;
            height: 14px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #444;
            margin-bottom: 15px;
        }

        #barra-progresso {
            width: 0%; /* Começa em 0 */
            height: 100%;
            background: linear-gradient(90deg, #ff6a00, #ff8c00); /* Laranja MYMEDIA */
            transition: width 0.2s ease-in-out;
        }

        .contador-texto {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Botão de teste (apenas para você ver funcionando) */
        .btn-teste {
            background-color: #ff6a00;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px;
        }
    </style>
</head>
<body>

    <div id="modal-processando">
        <div class="titulo-processando">Processando...</div>
        
        <div class="container-barra">
            <div id="barra-progresso"></div>
        </div>

        <div class="contador-texto">
            <span id="valor-atual">0</span> / <span id="valor-total">0</span>
        </div>
    </div>

    <button class="btn-teste" onclick="exemploDeCargaExcel()">Testar Importação (364 itens)</button>

    <script>
        /**
         * Função principal para atualizar o seu modal.
         * @param {number} atual - O item que está sendo processado agora.
         * @param {number} total - O total de itens (ex: 364 ou 350).
         */
        function atualizarProgresso(atual, total) {
            const modal = document.getElementById('modal-processando');
            const barra = document.getElementById('barra-progresso');
            const spanAtual = document.getElementById('valor-atual');
            const spanTotal = document.getElementById('valor-total');

            // Mostrar o modal
            modal.style.display = 'flex';

            // Atualizar os números
            spanAtual.innerText = atual;
            spanTotal.innerText = total;

            // Calcular e atualizar a barra laranja
            const porcentagem = (atual / total) * 100;
            barra.style.width = porcentagem + '%';

            // Esconder o modal quando terminar
            if (atual >= total && total > 0) {
                setTimeout(() => {
                    modal.style.display = 'none';
                    alert('Processamento de ' + total + ' itens concluído!');
                }, 500);
            }
        }

        // Função de simulação baseada nos seus dados reais (364 itens)
        async function exemploDeCargaExcel() {
            const totalItens = 364; // Como visto no seu histórico
            
            for (let i = 1; i <= totalItens; i++) {
                // Aqui você colocaria a sua lógica de salvar cada linha no banco
                atualizarProgresso(i, totalItens);
                
                // Pequena pausa para vermos a animação (remova no código real)
                await new Promise(r => setTimeout(r, 10)); 
            }
        }
    </script>

</body>
</html>
